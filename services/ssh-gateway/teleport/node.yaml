# SPDX-License-Identifier: AGPL-3.0-or-later
# Teleport SSH node = a workspace. It joins the cluster over the auth port with the
# static token and exposes the workspace for SSH. Teleport's ssh_service IS the SSH
# server (no separate sshd); it opens sessions as the per-workspace OS principal
# (`dev-<user>`), auto-provisioned via the role's create_host_user_mode.
version: v3
teleport:
  nodename: workspace-1
  data_dir: /var/lib/teleport
  auth_token: edd-e2e-node-join
  auth_server: teleport-auth:3025
  log:
    output: stderr
    severity: INFO
auth_service:
  enabled: "no"
proxy_service:
  enabled: "no"
ssh_service:
  enabled: "yes"
  labels:
    edd-workspace: "true"
