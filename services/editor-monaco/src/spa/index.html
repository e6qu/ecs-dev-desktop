<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>edd · Monaco</title>
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <div id="sidebar-head">
          <span>EXPLORER</span>
          <button type="button" id="new-file" aria-label="New file" title="New file">+</button>
        </div>
        <div id="files" aria-label="Files"></div>
      </aside>
      <section id="main">
        <div id="tabbar">
          <a id="edd-home" href="/workspaces" title="Back to the EDD portal (your workspaces)">
            ⌂ EDD home
          </a>
          <span id="current-file">no file open</span>
          <button
            type="button"
            id="toggle-terminal"
            aria-controls="terminal-panel"
            aria-expanded="true"
          >
            Terminal <kbd>Ctrl+`</kbd>
          </button>
        </div>
        <div id="editor"></div>
        <div id="terminal-panel">
          <div id="terminal-tabs" role="tablist" aria-label="Terminal sessions">
            <button
              type="button"
              id="new-terminal-tab"
              aria-label="New terminal tab"
              title="New terminal tab (Ctrl+Shift+`)"
            >
              +
            </button>
          </div>
          <div id="terminal-panes"></div>
        </div>
      </section>
    </div>
    <div id="status" role="status"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
