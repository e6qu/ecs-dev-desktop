<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>edd · Monaco</title>
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <div id="sidebar-head">EXPLORER</div>
        <div id="files" aria-label="Files"></div>
      </aside>
      <section id="main">
        <div id="tabbar">
          <span id="current-file">no file open</span>
          <button
            type="button"
            id="toggle-terminal"
            aria-controls="terminal-panel"
            aria-expanded="false"
          >
            Terminal
          </button>
        </div>
        <div id="editor"></div>
        <div id="terminal-panel" hidden><div id="terminal"></div></div>
      </section>
    </div>
    <div id="status" role="status"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
