# SSH e2e harness: a workspace node running standard OpenSSH (sshd), certificate-auth only.
#
# Auth is via ephemeral SSH CA certificates — the test harness (scripts/gen-ssh-ca.sh)
# generates the CA and signs user certs; sshd trusts the CA public key mounted from
# temp/ssh-ca/ca.pub. Run gen-ssh-ca.sh before `docker compose up`.
#
# Session recording is a deploy-tier feature (CloudTrail events via AWS SDK, not
# sshd-level recording); the e2e asserts connect-as-principal and authz-deny only.
services:
  workspace-node:
    build:
      context: .
      dockerfile: services/ssh-gateway/Dockerfile.node
    container_name: edd-workspace-node
    volumes:
      # CA public key: sshd trusts any certificate signed by this key.
      - ./services/ssh-gateway/temp/ssh-ca/ca.pub:/etc/ssh/workspace-ca.pub:ro
    ports:
      - "2222:22"
    healthcheck:
      test: ["CMD-SHELL", "/usr/sbin/sshd -t -f /etc/ssh/sshd_config && echo ok"]
      interval: 3s
      timeout: 3s
      retries: 20
