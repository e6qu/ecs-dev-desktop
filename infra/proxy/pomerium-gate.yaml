# Pomerium config for the FULL per-workspace-authz e2e (docker-compose.gate.yml):
# identical to infra/proxy/pomerium.yaml EXCEPT the wildcard workspace route's
# `to:` targets the workspace GATE (PEP) instead of a static upstream. The gate
# verifies the Pomerium identity assertion against Pomerium's JWKS and calls the
# control-plane PDP (/api/internal/authz) before forwarding, so only the
# workspace's owner (or an admin) reaches it. The separate file keeps the
# identity-only suites (proxy-routing, pomerium-authed, the browser login) on the
# direct-upstream pomerium.yaml. See AGENTS.md §1 + DO_NEXT #5.
address: ":443"
certificate_file: "/pomerium/tls/server.pem"
certificate_key_file: "/pomerium/tls/server-key.pem"

# Throwaway, all-zeros test secrets (base64 of 32 zero bytes) — NOT real keys.
shared_secret: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
cookie_secret: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="

# Throwaway EC P-256 signing key for the JWT assertion (X-Pomerium-Jwt-Assertion);
# the gate's PDP verifies assertions against Pomerium's JWKS derived from it.
signing_key: ""

authenticate_service_url: "https://authenticate.devbox.localhost:8443"

idp_provider: "oidc"
idp_provider_url: "http://azure-sim:4568/edd-e2e-tenant/v2.0"
idp_client_id: "pomerium-edd"
idp_client_secret: "pomerium-edd-secret"

pass_identity_headers: true

routes:
  # Public health route — proves Pomerium reaches the gate at all, and serves
  # the public /.well-known/pomerium/jwks.json the control-plane PDP verifies
  # assertions against (the web container fetches it via the health.devbox.localhost
  # network alias over trusted-CA TLS).
  - from: "https://health.devbox.localhost"
    to: "http://workspace-upstream:80"
    allow_public_unauthenticated_access: true

  # Auth probe: a DIRECT (non-gated) authenticated route to the echo upstream so
  # the harness can learn the authenticated sim user's email — needed to seed an
  # owned workspace before the test, since the gated wildcard route below denies
  # every not-yet-owned host (the analogue of the in-process PDP e2e's probe).
  - from: "https://auth-probe.devbox.localhost"
    to: "http://workspace-upstream:80"
    allow_any_authenticated_user: true
    pass_identity_headers: true

  # Wildcard workspace routing THROUGH THE GATE: any `<ws-id>.devbox.localhost`
  # routes to the workspace gate, which enforces per-workspace ownership (PDP)
  # before forwarding to the live workspace. preserve_host_header so the gate sees
  # `<ws-id>.devbox.localhost` and can derive the workspace id.
  - from: "https://*.devbox.localhost"
    to: "http://workspace-gate:8080"
    preserve_host_header: true
    allow_any_authenticated_user: true
    pass_identity_headers: true
