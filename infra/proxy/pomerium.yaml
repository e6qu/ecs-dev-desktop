# Pomerium identity-aware proxy for wildcard workspace routing (AGENTS.md §1):
# every workspace is reached at `<name>.devbox.<domain>` and access is gated on a
# real OIDC identity. This is the real Pomerium product, configured declaratively;
# the e2e points it at an OIDC IdP (the sockerless azure sim) and a workspace
# upstream, then asserts wildcard routing + the identity gate.
#
# All-in-one mode (authenticate+authorize+proxy in one process), real TLS:
# Pomerium builds every absolute URL (sign-in redirects, post-auth return) with
# the https scheme unconditionally (urlutil.GetAbsoluteURL in the Pomerium
# source), so a real browser can only complete the flow against a TLS listener.
# The harness cert comes from scripts/gen-sim-tls-cert.sh (SANs cover
# *.devbox.localhost); production injects real certificates.
address: ":443"
certificate_file: "/pomerium/tls/server.pem"
certificate_key_file: "/pomerium/tls/server-key.pem"

# Throwaway, all-zeros test secrets (base64 of 32 zero bytes) — NOT real keys.
# Real deployments inject 32-byte random secrets via env/Secrets Manager.
shared_secret: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
cookie_secret: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="

# Throwaway EC P-256 signing key for JWT assertion (X-Pomerium-Jwt-Assertion).
# Without a signing_key, getSignedJWT() returns "" and Envoy drops the empty
# header — pass_identity_headers:true on the route then has no effect.
# Real deployments inject a secret via env/Secrets Manager.
signing_key: ""

# The authenticate service is served by this same process on its own route host.
# The published harness port (8443) is part of the externally-visible URL so a
# real user agent can follow the issued redirects; production serves 443.
authenticate_service_url: "https://authenticate.devbox.localhost:8443"

# OIDC identity provider = the sockerless azure/Entra sim (standard discovery).
idp_provider: "oidc"
idp_provider_url: "http://azure-sim:4568/edd-e2e-tenant/v2.0"
idp_client_id: "pomerium-edd"
idp_client_secret: "pomerium-edd-secret"

# Global identity header forwarding (belt + suspenders with per-route setting).
# Ensures X-Pomerium-Jwt-Assertion is injected on all routes, including the
# wildcard. Per-route pass_identity_headers on the wildcard route alone may
# not apply in all Pomerium 0.32.x builds.
pass_identity_headers: true

routes:
  # Public health route — proves Pomerium reaches the workspace upstream at all.
  - from: "https://health.devbox.localhost"
    to: "http://workspace-upstream:80"
    allow_public_unauthenticated_access: true

  # Wildcard workspace routing, identity-gated: any `<name>.devbox.localhost`
  # routes to the workspace upstream but requires an authenticated identity.
  # pass_identity_headers injects X-Pomerium-Jwt-Assertion into the proxied
  # request so upstream services can verify the authenticated user's identity.
  - from: "https://*.devbox.localhost"
    to: "http://workspace-upstream:80"
    allow_any_authenticated_user: true
    pass_identity_headers: true
