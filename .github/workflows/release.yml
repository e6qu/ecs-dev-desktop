# SPDX-License-Identifier: AGPL-3.0-or-later
# Release pipeline: build, publish, and deploy the platform's app images.
# Triggered by every main merge, by a version tag (`v*`), or manually. Uses GitHub OIDC -> an
# AWS role with ECR/ECS/Scheduler permissions (no static keys), exactly like the e2e-aws
# tier. The Terraform module must have been applied first (it creates the ECR
# repositories); this closes the two-phase-apply friction documented in
# docs/deploying.md.
#
# Prerequisites (non-secret coordinates, supplied by scripts/bootstrap-release-oidc.sh):
#   - repo/environment variable `RELEASE_AWS_ROLE_ARN` — OIDC-assumable role ARN
#     (needs only push/read actions on the module's Terraform-created repos)
#   - repo/environment variable `RELEASE_AWS_ACCOUNT`  — 12-digit account id
#   - repo/environment variable `RELEASE_AWS_REGION`   — AWS region for ECR
#   - repo/environment variable `RELEASE_NAME_PREFIX`  — the module `name` (e.g. edd-dev)
# Do not store static secrets in GitHub variables or secrets for this workflow.
# Authentication is OIDC -> STS short-lived credentials.
#
# What it publishes and rolls (see scripts/publish-images.sh with EDD_BUILD_TARGET=web):
#   <prefix>/control-plane:<tag>         Next.js app (also the reconciler image)
#   <prefix>/control-plane:<tag>-amd64   amd64 image
#   <prefix>/ssh-gateway:<tag>           SSH gateway (IMMUTABLE repo — each tag once)
#   <prefix>/ssh-gateway:<tag>-amd64     amd64 image
# Workspace/golden image rebuilds are handled by the separate non-blocking
# golden-images workflow, not by this release workflow. The tag without the suffix
# is a manifest over the architectures built by this workflow; the suffixed tags
# are the per-arch images for runners (e.g. Lambda) that cannot consume manifests.
# After publish, scripts/deploy-release-images.sh registers fresh task-definition
# revisions for the control plane, reconciler, and SSH gateway, updates the ECS
# services and reconciler Scheduler target, then exits. ECS convergence is async;
# post-deploy-smoke verifies the public app after the release workflow succeeds.
name: release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (defaults to the git short sha)"
        required: false
        default: ""

permissions:
  id-token: write
  contents: read

concurrency: release

jobs:
  # Per-arch build matrix on native runners (amd64 on ubuntu-latest, arm64 on ubuntu-24.04-arm) so
  # neither the control-plane nor ssh-gateway image is built under slow QEMU emulation. Each job
  # pushes only the per-arch tags (EDD_SKIP_MANIFEST); the `deploy` job combines + rolls them.
  publish:
    name: publish images (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    env:
      RELEASE_AWS_ACCOUNT: ${{ vars.RELEASE_AWS_ACCOUNT }}
      RELEASE_AWS_REGION: ${{ vars.RELEASE_AWS_REGION }}
      RELEASE_AWS_ROLE_ARN: ${{ vars.RELEASE_AWS_ROLE_ARN }}
      RELEASE_NAME_PREFIX: ${{ vars.RELEASE_NAME_PREFIX }}
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' && inputs.tag || github.sha }}
      EDD_BUILD_TARGET: web
      EDD_BUILD_ARCHS: ${{ matrix.arch }}
      EDD_BUILDX_CACHE: gha
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable

      - run: pnpm install --frozen-lockfile

      - name: Validate release coordinates
        run: |
          set -euo pipefail
          missing=0
          for name in RELEASE_AWS_ACCOUNT RELEASE_AWS_REGION RELEASE_AWS_ROLE_ARN RELEASE_NAME_PREFIX; do
            if [ -z "${!name}" ]; then
              echo "::error::${name} is required for the release workflow"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          if [[ ! "$RELEASE_AWS_ACCOUNT" =~ ^[0-9]{12}$ ]]; then
            echo "::error::RELEASE_AWS_ACCOUNT must be a 12-digit AWS account id"
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          role-to-assume: ${{ env.RELEASE_AWS_ROLE_ARN }}
          aws-region: ${{ env.RELEASE_AWS_REGION }}
          role-session-name: release-${{ matrix.arch }}-${{ github.run_id }}

      - name: Verify assumed identity
        run: aws sts get-caller-identity

      - name: Build & push per-arch images
        env:
          EDD_BUILDX_OUTPUT: push
          EDD_SKIP_MANIFEST: "1"
        run: |
          sh scripts/publish-images.sh \
            "$RELEASE_AWS_ACCOUNT" \
            "$RELEASE_AWS_REGION" \
            "$RELEASE_NAME_PREFIX" \
            "${TAG:0:12}"

  # Combine the per-arch images into multi-arch manifests, then roll the ECS services onto them
  # (pinned to arm64 by deploy-release-images.sh). Single job so the manifest exists before deploy.
  deploy:
    name: publish manifests + deploy ECS
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RELEASE_AWS_ACCOUNT: ${{ vars.RELEASE_AWS_ACCOUNT }}
      RELEASE_AWS_REGION: ${{ vars.RELEASE_AWS_REGION }}
      RELEASE_AWS_ROLE_ARN: ${{ vars.RELEASE_AWS_ROLE_ARN }}
      RELEASE_NAME_PREFIX: ${{ vars.RELEASE_NAME_PREFIX }}
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' && inputs.tag || github.sha }}
      EDD_BUILD_TARGET: web
      EDD_BUILD_ARCHS: amd64 arm64
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          role-to-assume: ${{ env.RELEASE_AWS_ROLE_ARN }}
          aws-region: ${{ env.RELEASE_AWS_REGION }}
          role-session-name: release-deploy-${{ github.run_id }}

      - name: Verify assumed identity
        run: aws sts get-caller-identity

      - name: Create & push multi-arch manifests
        env:
          EDD_BUILDX_OUTPUT: push
          EDD_MANIFEST_ONLY: "1"
        run: |
          sh scripts/publish-images.sh \
            "$RELEASE_AWS_ACCOUNT" \
            "$RELEASE_AWS_REGION" \
            "$RELEASE_NAME_PREFIX" \
            "${TAG:0:12}"

      - name: Deploy ECS services (arm64)
        env:
          EDD_DEPLOY_ARCH: arm64
        run: |
          sh scripts/deploy-release-images.sh \
            "$RELEASE_AWS_ACCOUNT" \
            "$RELEASE_AWS_REGION" \
            "$RELEASE_NAME_PREFIX" \
            "${TAG:0:12}"

      - name: Write release metadata
        run: |
          set -euo pipefail
          mkdir -p temp/release
          printf '%s\n' "${TAG:0:12}" > temp/release/deployed-tag

      - name: Upload release metadata
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-deploy
          path: temp/release/deployed-tag
          if-no-files-found: error
          retention-days: 7
