# SPDX-License-Identifier: AGPL-3.0-or-later
# Golden image collection.
#
# Pull requests validate the shared base + language variants without publishing.
# Main-branch pushes publish the configured golden variants to
# ECR via GitHub OIDC. This workflow is intentionally separate from `release`: a
# control-plane deploy must not wait for the expensive workspace image build, and a
# failed golden build can be rerun without rolling ECS services.
name: golden-images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "infra/images/**"
      - "packages/e2e/src/image-variants.e2e.ts"
      - ".github/workflows/golden-images.yml"

concurrency:
  group: golden-images-${{ github.ref }}
  # Queue main-branch builds instead of cancelling them: a cancelled publish
  # leaves the catalog waiting on a tag that never reaches ECR. PR refs still
  # cancel superseded validation runs.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: validate golden images
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - run: pnpm install --frozen-lockfile
      # Build the shared base once, then every variant FROM it (base layer cached).
      - name: Build base + language variants
        run: |
          # build.sh stages the first-party Monaco editor (@edd/editor-monaco) into the base
          # context before docker build; variants then build FROM the base unchanged.
          infra/images/base/build.sh edd-base:e2e
          for v in typescript python go java rust; do
            docker build --build-arg BASE=edd-base:e2e -t "edd-ws-${v}:e2e" "infra/images/${v}"
          done
          docker images --format '{{.Repository}}:{{.Tag}} {{.Size}}' | grep -E 'edd-base|edd-ws-'
      # Each variant: its toolchain present, the shared base behaviour intact, and slim.
      - name: Variant smoke tests
        run: pnpm --filter @edd/e2e test:images

  # Per-arch build matrix: each architecture builds on its OWN native runner (amd64 on
  # ubuntu-latest, arm64 on ubuntu-24.04-arm), so the ~3GB golden images never pay the cost of
  # QEMU emulating the other arch. Each job pushes only the per-arch tags (EDD_SKIP_MANIFEST);
  # the `manifest` job below combines them into the `:<tag>` multi-arch manifest.
  publish:
    name: publish golden images (${{ matrix.arch }})
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    env:
      RELEASE_AWS_ACCOUNT: ${{ vars.RELEASE_AWS_ACCOUNT }}
      RELEASE_AWS_REGION: ${{ vars.RELEASE_AWS_REGION }}
      RELEASE_AWS_ROLE_ARN: ${{ vars.RELEASE_AWS_ROLE_ARN }}
      RELEASE_NAME_PREFIX: ${{ vars.RELEASE_NAME_PREFIX }}
      RELEASE_GOLDEN_VARIANTS: ${{ vars.RELEASE_GOLDEN_VARIANTS }}
      TAG: ${{ github.sha }}
      EDD_BUILD_TARGET: golden
      EDD_BUILD_ARCHS: ${{ matrix.arch }}
      EDD_BUILDX_CACHE: gha
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - run: pnpm install --frozen-lockfile

      - name: Validate release coordinates
        run: |
          set -euo pipefail
          missing=0
          for name in RELEASE_AWS_ACCOUNT RELEASE_AWS_REGION RELEASE_AWS_ROLE_ARN RELEASE_NAME_PREFIX RELEASE_GOLDEN_VARIANTS; do
            if [ -z "${!name}" ]; then
              echo "::error::${name} is required for the golden-images workflow"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          if [[ ! "$RELEASE_AWS_ACCOUNT" =~ ^[0-9]{12}$ ]]; then
            echo "::error::RELEASE_AWS_ACCOUNT must be a 12-digit AWS account id"
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          role-to-assume: ${{ env.RELEASE_AWS_ROLE_ARN }}
          aws-region: ${{ env.RELEASE_AWS_REGION }}
          role-session-name: golden-images-${{ matrix.arch }}-${{ github.run_id }}

      - name: Verify assumed identity
        run: aws sts get-caller-identity

      - name: Build & push golden per-arch images
        env:
          EDD_BUILDX_OUTPUT: push
          EDD_SKIP_MANIFEST: "1"
        run: |
          read -r -a variants <<< "$RELEASE_GOLDEN_VARIANTS"
          sh scripts/publish-images.sh \
            "$RELEASE_AWS_ACCOUNT" \
            "$RELEASE_AWS_REGION" \
            "$RELEASE_NAME_PREFIX" \
            "${TAG:0:12}" \
            "${variants[@]}"

  # Combine the per-arch tags into the multi-arch `:<tag>` manifest ECS Fargate pulls. No build
  # here, so it needs neither a native runner nor Node — just Docker + AWS creds.
  manifest:
    name: publish golden multi-arch manifests
    if: github.event_name == 'push'
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RELEASE_AWS_ACCOUNT: ${{ vars.RELEASE_AWS_ACCOUNT }}
      RELEASE_AWS_REGION: ${{ vars.RELEASE_AWS_REGION }}
      RELEASE_AWS_ROLE_ARN: ${{ vars.RELEASE_AWS_ROLE_ARN }}
      RELEASE_NAME_PREFIX: ${{ vars.RELEASE_NAME_PREFIX }}
      RELEASE_GOLDEN_VARIANTS: ${{ vars.RELEASE_GOLDEN_VARIANTS }}
      TAG: ${{ github.sha }}
      EDD_BUILD_TARGET: golden
      EDD_BUILD_ARCHS: amd64 arm64
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          role-to-assume: ${{ env.RELEASE_AWS_ROLE_ARN }}
          aws-region: ${{ env.RELEASE_AWS_REGION }}
          role-session-name: golden-manifest-${{ github.run_id }}

      - name: Create & push multi-arch manifests
        env:
          EDD_BUILDX_OUTPUT: push
          EDD_MANIFEST_ONLY: "1"
        run: |
          read -r -a variants <<< "$RELEASE_GOLDEN_VARIANTS"
          sh scripts/publish-images.sh \
            "$RELEASE_AWS_ACCOUNT" \
            "$RELEASE_AWS_REGION" \
            "$RELEASE_NAME_PREFIX" \
            "${TAG:0:12}" \
            "${variants[@]}"

      - name: Verify pushed golden OCI image shape
        run: |
          set -euo pipefail
          read -r -a variants <<< "$RELEASE_GOLDEN_VARIANTS"
          repositories="edd-base"
          for variant in "${variants[@]}"; do
            repositories="$repositories golden/$variant"
          done
          # Repository coordinates are whitespace-delimited by contract.
          # shellcheck disable=SC2086
          sh scripts/verify-published-images.sh \
            "$RELEASE_AWS_ACCOUNT" \
            "$RELEASE_AWS_REGION" \
            "$RELEASE_NAME_PREFIX" \
            "${TAG:0:12}" \
            $repositories
