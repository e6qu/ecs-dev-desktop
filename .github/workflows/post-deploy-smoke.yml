# SPDX-License-Identifier: AGPL-3.0-or-later
name: post-deploy-smoke

on:
  workflow_run:
    workflows: ["release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      expected_sha:
        description: "Expected deployed short sha"
        required: true

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: post-deploy-smoke-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.expected_sha }}
  cancel-in-progress: true

jobs:
  smoke:
    name: verify deployed app
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      EDD_APP_URL: ${{ vars.EDD_APP_URL }}
      RELEASE_AWS_ROLE_ARN: ${{ vars.RELEASE_AWS_ROLE_ARN }}
      RELEASE_AWS_REGION: ${{ vars.RELEASE_AWS_REGION }}
      DYNAMODB_TABLE: ${{ vars.EDD_DYNAMODB_TABLE }}
      AUTH_SECRET_ID: ${{ vars.EDD_AUTH_SECRET_ID }}
      MANUAL_EXPECTED_SHA: ${{ inputs.expected_sha }}
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - run: pnpm install --frozen-lockfile

      - name: Download release metadata
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-deploy
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: temp/release

      - name: Validate smoke coordinates
        run: |
          set -euo pipefail
          if [ -z "$EDD_APP_URL" ]; then
            echo "::error::EDD_APP_URL repository variable is required"
            exit 1
          fi
          if [ -z "$RELEASE_AWS_ROLE_ARN" ]; then
            echo "::error::RELEASE_AWS_ROLE_ARN repository variable is required"
            exit 1
          fi
          if [ -z "$RELEASE_AWS_REGION" ]; then
            echo "::error::RELEASE_AWS_REGION repository variable is required"
            exit 1
          fi
          if [ -z "$DYNAMODB_TABLE" ]; then
            echo "::error::EDD_DYNAMODB_TABLE repository variable is required"
            exit 1
          fi
          if [ -z "$AUTH_SECRET_ID" ]; then
            echo "::error::EDD_AUTH_SECRET_ID repository variable is required"
            exit 1
          fi
          if [ "$GITHUB_EVENT_NAME" = "workflow_run" ]; then
            if [ ! -s temp/release/deployed-tag ]; then
              echo "::error::release metadata artifact did not contain deployed-tag"
              exit 1
            fi
            expected_sha=$(cat temp/release/deployed-tag)
          else
            expected_sha="$MANUAL_EXPECTED_SHA"
          fi
          if [ -z "$expected_sha" ]; then
            echo "::error::expected deployed sha is required"
            exit 1
          fi
          printf 'EXPECTED_SHA=%s\n' "$expected_sha" >> "$GITHUB_ENV"

      - name: Configure AWS credentials for authenticated smoke
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          role-to-assume: ${{ env.RELEASE_AWS_ROLE_ARN }}
          aws-region: ${{ env.RELEASE_AWS_REGION }}

      - name: Wait for expected app build
        run: |
          set -euo pipefail
          if [ -z "$EXPECTED_SHA" ]; then
            echo "::error::expected deployed sha is required"
            exit 1
          fi
          short="${EXPECTED_SHA:0:12}"
          deadline=$((SECONDS + 540))
          last=""
          while [ "$SECONDS" -lt "$deadline" ]; do
            if output=$(sh scripts/check-deployed-app.sh "$EDD_APP_URL" "$short" 2>&1); then
              printf '%s\n' "$output"
              exit 0
            fi
            last="$output"
            printf '%s\n' "$output"
            sleep 10
          done
          echo "::error::deployed app did not report expected build before the smoke deadline"
          printf '%s\n' "$last"
          exit 1

      - name: Install Playwright Chromium
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Open and screenshot one fresh workspace per editor
        run: pnpm --filter web exec tsx scripts/screenshot-deployed-workspaces.ts
        env:
          AWS_REGION: ${{ env.RELEASE_AWS_REGION }}
          EDD_SHOT_OUT: ${{ github.workspace }}/temp/workspace-screenshots

      - name: Upload workspace screenshots
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: workspace-screenshots
          path: temp/workspace-screenshots
          if-no-files-found: error
