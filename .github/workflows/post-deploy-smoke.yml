# SPDX-License-Identifier: AGPL-3.0-or-later
name: post-deploy-smoke

on:
  workflow_dispatch:
    inputs:
      expected_sha:
        description: "Exact deployed 12-character source revision"
        required: true

permissions:
  contents: read

concurrency:
  group: post-deploy-smoke
  cancel-in-progress: true

env:
  EDD_APP_URL: ${{ vars.EDD_APP_URL }}
  SHAUTH_ISSUER: ${{ vars.EDD_SHAUTH_ISSUER }}
  SHAUTH_USERNAME: ${{ vars.EDD_SHAUTH_SMOKE_USERNAME }}
  SHAUTH_PASSWORD: ${{ secrets.EDD_SHAUTH_SMOKE_PASSWORD }}
  EXPECTED_SHA: ${{ inputs.expected_sha }}

jobs:
  release:
    name: verify deployed release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Validate public coordinates
        run: |
          set -euo pipefail
          for name in EDD_APP_URL SHAUTH_ISSUER SHAUTH_USERNAME SHAUTH_PASSWORD EXPECTED_SHA; do
            if [ -z "${!name}" ]; then
              echo "::error::${name} is required"
              exit 1
            fi
          done
          if [[ ! "$EXPECTED_SHA" =~ ^[0-9a-f]{12}$ ]]; then
            echo "::error::expected_sha must be an exact 12-character lowercase source revision"
            exit 1
          fi
          if [[ ! "$SHAUTH_USERNAME" =~ ^smoke- ]]; then
            echo "::error::EDD_SHAUTH_SMOKE_USERNAME must use the reserved smoke- prefix"
            exit 1
          fi
      - name: Wait for the Terraform-applied release
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 600))
          last=""
          while [ "$SECONDS" -lt "$deadline" ]; do
            if output=$(sh scripts/check-deployed-app.sh "$EDD_APP_URL" "$EXPECTED_SHA" 2>&1); then
              printf '%s\n' "$output"
              exit 0
            fi
            last="$output"
            printf '%s\n' "$output"
            sleep 10
          done
          echo "::error::Terraform-applied release did not become healthy within ten minutes"
          printf '%s\n' "$last"
          exit 1

  editor:
    name: verify deployed editor (${{ matrix.editor }})
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        editor: [openvscode, monaco, terminal, opencode]
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --filter web exec playwright install chromium
      - name: Open one real workspace through Shauth
        env:
          EDD_VERIFY_EDITORS: ${{ matrix.editor }}
          EDD_SHOT_OUT: ${{ github.workspace }}/temp/workspace-screenshots
        run: timeout --signal=TERM --kill-after=30s 12m pnpm --filter web exec tsx scripts/screenshot-deployed-workspaces.ts
      - name: Upload workspace evidence
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: workspace-${{ matrix.editor }}
          path: temp/workspace-screenshots
          if-no-files-found: warn

  sweep:
    name: sweep deployed smoke workspaces
    if: always()
    needs: editor
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --filter web exec playwright install chromium
      - name: Remove any smoke-owned workspace left by an interrupted matrix cell
        run: timeout --signal=TERM --kill-after=30s 12m pnpm --filter web exec tsx scripts/sweep-deployed-smoke-workspaces.ts
