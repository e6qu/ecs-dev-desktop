# SPDX-License-Identifier: AGPL-3.0-or-later
name: post-deploy-smoke

on:
  workflow_dispatch:
    inputs:
      expected_sha:
        description: "Expected deployed short sha"
        required: true

permissions:
  contents: read
  id-token: write

# Single shared group: only the newest explicitly requested deployed smoke matters.
concurrency:
  group: post-deploy-smoke
  cancel-in-progress: true

jobs:
  smoke:
    name: verify deployed app
    runs-on: ubuntu-latest
    # Above the provable worst case so a timeout SIGKILL can never abort cleanup
    # mid-flight and leak workspaces: setup ~6 + app-build wait 9 + playwright 2
    # + smoke step <=110 + upload + re-auth + sweep <=35 ~= 165 min.
    timeout-minutes: 180
    env:
      EDD_APP_URL: ${{ vars.EDD_APP_URL }}
      EDD_SMOKE_AWS_ROLE_ARN: ${{ vars.EDD_SMOKE_AWS_ROLE_ARN }}
      EDD_SMOKE_AWS_REGION: ${{ vars.EDD_SMOKE_AWS_REGION }}
      DYNAMODB_TABLE: ${{ vars.EDD_DYNAMODB_TABLE }}
      AUTH_SECRET_ID: ${{ vars.EDD_AUTH_SECRET_ID }}
      EXPECTED_SHA: ${{ inputs.expected_sha }}
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - run: pnpm install --frozen-lockfile

      - name: Validate smoke coordinates
        run: |
          set -euo pipefail
          if [ -z "$EDD_APP_URL" ]; then
            echo "::error::EDD_APP_URL repository variable is required"
            exit 1
          fi
          if [ -z "$EDD_SMOKE_AWS_ROLE_ARN" ]; then
            echo "::error::EDD_SMOKE_AWS_ROLE_ARN repository variable is required"
            exit 1
          fi
          if [ -z "$EDD_SMOKE_AWS_REGION" ]; then
            echo "::error::EDD_SMOKE_AWS_REGION repository variable is required"
            exit 1
          fi
          if [ -z "$DYNAMODB_TABLE" ]; then
            echo "::error::EDD_DYNAMODB_TABLE repository variable is required"
            exit 1
          fi
          if [ -z "$AUTH_SECRET_ID" ]; then
            echo "::error::EDD_AUTH_SECRET_ID repository variable is required"
            exit 1
          fi
          if [[ ! "$EXPECTED_SHA" =~ ^[0-9a-f]{12}$ ]]; then
            echo "::error::expected deployed sha must be an exact 12-character lowercase hexadecimal source prefix"
            exit 1
          fi

      - name: Configure AWS credentials for authenticated smoke
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          role-to-assume: ${{ env.EDD_SMOKE_AWS_ROLE_ARN }}
          aws-region: ${{ env.EDD_SMOKE_AWS_REGION }}

      - name: Wait for expected app build
        run: |
          set -euo pipefail
          if [ -z "$EXPECTED_SHA" ]; then
            echo "::error::expected deployed sha is required"
            exit 1
          fi
          deadline=$((SECONDS + 540))
          last=""
          while [ "$SECONDS" -lt "$deadline" ]; do
            if output=$(sh scripts/check-deployed-app.sh "$EDD_APP_URL" "$EXPECTED_SHA" 2>&1); then
              printf '%s\n' "$output"
              exit 0
            fi
            last="$output"
            printf '%s\n' "$output"
            sleep 10
          done
          echo "::error::deployed app did not report expected build before the smoke deadline"
          printf '%s\n' "$last"
          exit 1

      - name: Install Playwright Chromium
        run: pnpm --filter web exec playwright install chromium

      - name: Open and screenshot one fresh workspace per editor
        # Worst case inside this step: catalog rollout hard cap 30 min + 4
        # editors x (8 min ready + ~5 min browser assertions) + parallel
        # best-effort cleanup (20 min terminate + 2 min purge) ~= 105 min. The
        # step-level timeout (below the job's) guarantees the sweep below
        # still runs inside the job budget.
        timeout-minutes: 110
        run: pnpm --filter web exec tsx scripts/screenshot-deployed-workspaces.ts
        env:
          AWS_REGION: ${{ env.EDD_SMOKE_AWS_REGION }}
          EDD_SHOT_OUT: ${{ github.workspace }}/temp/workspace-screenshots

      - name: Upload workspace screenshots
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: workspace-screenshots
          path: temp/workspace-screenshots
          if-no-files-found: warn

      - name: Re-assume AWS role for the sweep
        # The OIDC role session from the first configure step lasts 1 h; a
        # slow smoke outlives it, so the sweep re-assumes before touching
        # Secrets Manager / DynamoDB.
        if: always()
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          role-to-assume: ${{ env.EDD_SMOKE_AWS_ROLE_ARN }}
          aws-region: ${{ env.EDD_SMOKE_AWS_REGION }}

      - name: Sweep leftover smoke workspaces
        # Safety net: a failed or killed smoke step must never leak smoke
        # workspaces (real Fargate + EBS cost) in production. Lists every
        # workspace via the admin API and best-effort deletes any owned by the
        # smoke prefixes (smoke-shot-/smoke-); fails only when a leftover
        # cannot be deleted.
        if: always()
        timeout-minutes: 35
        env:
          AWS_REGION: ${{ env.EDD_SMOKE_AWS_REGION }}
        run: |
          set -euo pipefail
          mkdir -p temp
          cat > temp/sweep-smoke-workspaces.mts <<'EOF'
          // SPDX-License-Identifier: AGPL-3.0-or-later
          import { revokeAuthSession } from "../apps/web/lib/auth-sessions";

          import {
            authJar,
            authSecret,
            requiredEnv,
            sweepSmokeWorkspaces,
          } from "../apps/web/scripts/deployed-workspace-smoke-lib";

          const baseUrl = requiredEnv("EDD_APP_URL").replace(/\/$/, "");
          const region = requiredEnv("AWS_REGION");
          process.env.DYNAMODB_TABLE = requiredEnv("DYNAMODB_TABLE");
          const secret = await authSecret(region, requiredEnv("AUTH_SECRET_ID"));
          const { jar, sessionId } = await authJar(secret, "smoke-sweep");
          try {
            const { swept, failures } = await sweepSmokeWorkspaces(baseUrl, jar);
            for (const id of swept) console.log(`edd: swept leftover smoke workspace ${id}`);
            if (swept.length === 0 && failures.length === 0) {
              console.log("edd: no leftover smoke workspaces");
            }
            if (failures.length > 0) {
              for (const failure of failures) console.error("edd: sweep failure:", failure);
              process.exitCode = 1;
            }
          } finally {
            await revokeAuthSession(sessionId);
          }
          EOF
          pnpm --filter web exec tsx "$GITHUB_WORKSPACE/temp/sweep-smoke-workspaces.mts"
