              --query "length(Table.GlobalSecondaryIndexes[?IndexName=='GSI2'])" --output text)"
          assert_eq "DynamoDB PITR DISABLED (sim fixture)" "DISABLED" \
            "$(aws --endpoint-url "${ENDPT}" dynamodb describe-continuous-backups \
              --table-name "${TABLE_NAME}" \
              --query 'ContinuousBackupsDescription.PointInTimeRecoveryDescription.PointInTimeRecoveryStatus' \
              --output text)"
          assert_eq "DynamoDB SSE ENABLED" "ENABLED" \
            "$(aws --endpoint-url "${ENDPT}" dynamodb describe-table \
              --table-name "${TABLE_NAME}" \
              --query 'Table.SSEDescription.Status' --output text)"
          assert_eq "DynamoDB SSE type KMS" "KMS" \
            "$(aws --endpoint-url "${ENDPT}" dynamodb describe-table \
              --table-name "${TABLE_NAME}" \
              --query 'Table.SSEDescription.SSEType' --output text)"
          assert_eq "DynamoDB SSE KMS key matches" "${KMS_ARN}" \
            "$(aws --endpoint-url "${ENDPT}" dynamodb describe-table \
              --table-name "${TABLE_NAME}" \
              --query 'Table.SSEDescription.KMSMasterKeyArn' --output text)"

          # -- DynamoDB: range key + GSI key schemas + projections ----------------
          assert_eq "DynamoDB range key SK" "SK" \
            "$(aws --endpoint-url "${ENDPT}" dynamodb describe-table \
              --table-name "${TABLE_NAME}" \
              --query "Table.KeySchema[?KeyType=='RANGE'].AttributeName|[0]" --output text)"
          assert_eq "DynamoDB GSI1 hash key GSI1PK" "GSI1PK" \
            "$(aws --endpoint-url "${ENDPT}" dynamodb describe-table \
              --table-name "${TABLE_NAME}" \
              --query "Table.GlobalSecondaryIndexes[?IndexName=='GSI1']|[0].KeySchema[?KeyType=='HASH'].AttributeName|[0]" \
              --output text)"
          assert_eq "DynamoDB GSI1 range key GSI1SK" "GSI1SK" \
            "$(aws --endpoint-url "${ENDPT}" dynamodb describe-table \
              --table-name "${TABLE_NAME}" \
              --query "Table.GlobalSecondaryIndexes[?IndexName=='GSI1']|[0].KeySchema[?KeyType=='RANGE'].AttributeName|[0]" \
              --output text)"
          assert_eq "DynamoDB GSI2 hash key GSI2PK" "GSI2PK" \
            "$(aws --endpoint-url "${ENDPT}" dynamodb describe-table \
              --table-name "${TABLE_NAME}" \
              --query "Table.GlobalSecondaryIndexes[?IndexName=='GSI2']|[0].KeySchema[?KeyType=='HASH'].AttributeName|[0]" \
              --output text)"
          assert_eq "DynamoDB GSI2 range key GSI2SK" "GSI2SK" \
            "$(aws --endpoint-url "${ENDPT}" dynamodb describe-table \
              --table-name "${TABLE_NAME}" \
              --query "Table.GlobalSecondaryIndexes[?IndexName=='GSI2']|[0].KeySchema[?KeyType=='RANGE'].AttributeName|[0]" \
              --output text)"
          assert_eq "DynamoDB GSI1 projection ALL" "ALL" \
            "$(aws --endpoint-url "${ENDPT}" dynamodb describe-table \
              --table-name "${TABLE_NAME}" \
              --query "Table.GlobalSecondaryIndexes[?IndexName=='GSI1']|[0].Projection.ProjectionType" \
              --output text)"
          assert_eq "DynamoDB GSI2 projection ALL" "ALL" \
            "$(aws --endpoint-url "${ENDPT}" dynamodb describe-table \
              --table-name "${TABLE_NAME}" \
              --query "Table.GlobalSecondaryIndexes[?IndexName=='GSI2']|[0].Projection.ProjectionType" \
              --output text)"

          # -- IAM policy simulation (existing 4 checks) -------------------------
          # Stated allow — DynamoDB PutItem on the owned table.
          assert_iam "dynamodb:PutItem allowed" "allowed" \
            --action-names "dynamodb:PutItem" --resource-arns "${TABLE_ARN}"
          # Implicit deny — action not in any policy statement.
          assert_iam "s3:GetObject implicitDeny" "implicitDeny" \
            --action-names "s3:GetObject" --resource-arns "arn:aws:s3:::bucket/key"
          # Tag condition not satisfied → implicit deny (ReapManagedEbsOnly only grants
          # ec2:DeleteVolume when aws:ResourceTag/edd:managed = "true").
          assert_iam "ec2:DeleteVolume untagged implicitDeny" "implicitDeny" \
            --action-names "ec2:DeleteVolume" \
            --resource-arns "arn:aws:ec2:us-east-1::volume/vol-untagged"
          # Tag condition satisfied → allowed.
          assert_iam "ec2:DeleteVolume tagged allowed" "allowed" \
            --action-names "ec2:DeleteVolume" \
            --resource-arns "arn:aws:ec2:us-east-1::volume/vol-managed" \
            --context-entries "ContextKeyName=aws:ResourceTag/edd:managed,ContextKeyValues=true,ContextKeyType=string"
          # ecs:RunTask scoped to the platform cluster (ecs:cluster condition satisfied).
          assert_iam "ecs:RunTask on platform cluster allowed" "allowed" \
            --action-names "ecs:RunTask" --resource-arns "${CLUSTER_ARN}" \
            --context-entries "ContextKeyName=ecs:cluster,ContextKeyValues=${CLUSTER_ARN},ContextKeyType=arn"
          # ecs:RunTask on a different cluster must be denied (condition not satisfied).
          assert_iam "ecs:RunTask on foreign cluster denied" "implicitDeny" \
            --action-names "ecs:RunTask" --resource-arns "arn:aws:ecs:us-east-1:123456789012:cluster/other"
          # ecs:RegisterTaskDefinition is in the same statement with ecs:cluster condition;
          # with the cluster context provided (as ECS injects when the caller runs in-cluster)
          # it must be allowed.
          EXEC_ROLE_ARN=$(aws --endpoint-url "${ENDPT}" iam get-role \
            --role-name eddsim-task-execution --query 'Role.Arn' --output text)
          assert_iam "ecs:RegisterTaskDefinition with cluster context allowed" "allowed" \
            --action-names "ecs:RegisterTaskDefinition" --resource-arns "*" \
            --context-entries "ContextKeyName=ecs:cluster,ContextKeyValues=${CLUSTER_ARN},ContextKeyType=arn"
          # logs:PutLogEvents allowed on owned log groups.
          CP_LOG_ARN=$(aws --endpoint-url "${ENDPT}" logs describe-log-groups \
            --log-group-name-prefix "/eddsim/control-plane" \
            --query 'logGroups[0].arn' --output text)
          assert_iam "logs:PutLogEvents on owned log group allowed" "allowed" \
            --action-names "logs:PutLogEvents" --resource-arns "${CP_LOG_ARN}:*"
          # logs:PutLogEvents denied on an unrelated log group.
          assert_iam "logs:PutLogEvents on foreign log group denied" "implicitDeny" \
            --action-names "logs:PutLogEvents" \
            --resource-arns "arn:aws:logs:us-east-1:123456789012:log-group:/other:*"
          # cloudtrail:LookupEvents — stars resource, should always be allowed.
          assert_iam "cloudtrail:LookupEvents allowed" "allowed" \
            --action-names "cloudtrail:LookupEvents" --resource-arns "*"
          # iam:PassRole to ECS tasks service allowed for execution + infra roles.
          assert_iam "iam:PassRole execution role to ecs-tasks allowed" "allowed" \
            --action-names "iam:PassRole" --resource-arns "${EXEC_ROLE_ARN}" \
            --context-entries "ContextKeyName=iam:PassedToService,ContextKeyValues=ecs-tasks.amazonaws.com,ContextKeyType=string"

          # -- IAM policy simulation: reconciler role --------------------------------
          RECON_ROLE=$(terraform -chdir="${TF_DIR}" output -raw reconciler_task_role_arn)
          assert_eq "reconciler ecs:StopTask on cluster allowed" "allowed" \
            "$(aws --endpoint-url "${ENDPT}" iam simulate-principal-policy \
              --policy-source-arn "${RECON_ROLE}" \
              --action-names "ecs:StopTask" --resource-arns "*" \
              --context-entries "ContextKeyName=ecs:cluster,ContextKeyValues=${CLUSTER_ARN},ContextKeyType=arn" \
              --query 'EvaluationResults[0].EvalDecision' --output text)"
          assert_eq "reconciler ec2:CreateSnapshot allowed" "allowed" \
            "$(aws --endpoint-url "${ENDPT}" iam simulate-principal-policy \
              --policy-source-arn "${RECON_ROLE}" \
              --action-names "ec2:CreateSnapshot" --resource-arns "*" \
              --query 'EvaluationResults[0].EvalDecision' --output text)"
          assert_eq "reconciler ec2:DeleteVolume tagged allowed" "allowed" \
            "$(aws --endpoint-url "${ENDPT}" iam simulate-principal-policy \
              --policy-source-arn "${RECON_ROLE}" \
              --action-names "ec2:DeleteVolume" \
              --resource-arns "arn:aws:ec2:us-east-1::volume/vol-managed" \
              --context-entries "ContextKeyName=aws:ResourceTag/edd:managed,ContextKeyValues=true,ContextKeyType=string" \
              --query 'EvaluationResults[0].EvalDecision' --output text)"
          assert_eq "reconciler dynamodb:Query allowed" "allowed" \
            "$(aws --endpoint-url "${ENDPT}" iam simulate-principal-policy \
              --policy-source-arn "${RECON_ROLE}" \
              --action-names "dynamodb:Query" --resource-arns "${TABLE_ARN}" \
              --query 'EvaluationResults[0].EvalDecision' --output text)"
          assert_eq "reconciler s3:GetObject implicitDeny" "implicitDeny" \
            "$(aws --endpoint-url "${ENDPT}" iam simulate-principal-policy \
              --policy-source-arn "${RECON_ROLE}" \
              --action-names "s3:GetObject" --resource-arns "arn:aws:s3:::bucket/key" \
              --query 'EvaluationResults[0].EvalDecision' --output text)"

          # -- CloudTrail post-apply: provisioning events captured ------------------
          # Verify that CloudTrail captured the key provisioning operations performed
          # by terraform apply. Uses server-side LookupAttributes EventName filtering
          # (supported since sockerless fc03b15 / PR #500) with --max-results 1 so
          # the result is independent of total event volume.
          assert_cloudtrail() {
            local label="$1" event_name="$2"
            local count
            count=$(aws --endpoint-url "${ENDPT}" cloudtrail lookup-events \
              --lookup-attributes AttributeKey=EventName,AttributeValue="${event_name}" \
              --max-results 1 \
              --query "length(Events)" \
              --output text 2>&1) || {
              printf 'FAIL  %s: cloudtrail lookup-events error: %s\n' "${label}" "${count}"
              exit 1
            }
            if [ "${count:-0}" -gt 0 ] 2>/dev/null; then
              printf 'PASS  %s\n' "${label}"
            else
              printf 'FAIL  %s: expected %s event in CloudTrail, got count=%s\n' \
                "${label}" "${event_name}" "${count}"
              exit 1
            fi
          }

          assert_cloudtrail "DynamoDB CreateTable captured in CloudTrail" "CreateTable"
          assert_cloudtrail "ECS CreateCluster captured in CloudTrail" "CreateCluster"
          assert_cloudtrail "ECS RegisterTaskDefinition captured in CloudTrail" \
            "RegisterTaskDefinition"
          assert_cloudtrail "KMS CreateKey captured in CloudTrail" "CreateKey"
          assert_cloudtrail "CloudWatch CreateLogGroup captured in CloudTrail" "CreateLogGroup"
          assert_cloudtrail "ECR CreateRepository captured in CloudTrail" "CreateRepository"
          assert_cloudtrail "IAM CreateRole captured in CloudTrail" "CreateRole"
          assert_cloudtrail "Scheduler CreateSchedule captured in CloudTrail" "CreateSchedule"

          # -- Functional probes: provisioned resources are actually usable ----------
          # DynamoDB: write → read → delete a probe item against the provisioned table.
          aws --endpoint-url "${ENDPT}" dynamodb put-item \
            --table-name "${TABLE_NAME}" \
            --item '{"PK":{"S":"probe#functional"},"SK":{"S":"post-apply"},"_k":{"S":"probe"}}'
          GOT_KIND=$(aws --endpoint-url "${ENDPT}" dynamodb get-item \
            --table-name "${TABLE_NAME}" \
            --key '{"PK":{"S":"probe#functional"},"SK":{"S":"post-apply"}}' \
            --query 'Item._k.S' --output text)
          assert_eq "DynamoDB provisioned table write/read functional" "probe" "${GOT_KIND}"
          aws --endpoint-url "${ENDPT}" dynamodb delete-item \
            --table-name "${TABLE_NAME}" \
            --key '{"PK":{"S":"probe#functional"},"SK":{"S":"post-apply"}}'
          printf 'PASS  DynamoDB probe item cleaned up\n'

          # CloudWatch Logs: create stream → write event → read back from provisioned log group.
          CP_LOG_GROUP=$(aws --endpoint-url "${ENDPT}" logs describe-log-groups \
            --log-group-name-prefix "/eddsim/control-plane" \
            --query 'logGroups[0].logGroupName' --output text)
          aws --endpoint-url "${ENDPT}" logs create-log-stream \
            --log-group-name "${CP_LOG_GROUP}" \
            --log-stream-name "probe/functional/post-apply"
          EPOCH_MS="$(date +%s)000"
          aws --endpoint-url "${ENDPT}" logs put-log-events \
            --log-group-name "${CP_LOG_GROUP}" \
            --log-stream-name "probe/functional/post-apply" \
            --log-events "[{\"timestamp\":${EPOCH_MS},\"message\":\"probe-post-apply-ok\"}]"
          PROBE_MSG=$(aws --endpoint-url "${ENDPT}" logs get-log-events \
            --log-group-name "${CP_LOG_GROUP}" \
            --log-stream-name "probe/functional/post-apply" \
            --query 'events[0].message' --output text)
          assert_eq "CloudWatch Logs provisioned log group write/read functional" \
            "probe-post-apply-ok" "${PROBE_MSG}"

          # ECS: register a probe task definition against the provisioned cluster.
          # Proves the cluster accepts task registrations (does not run a container).
          PROBE_TD_STATUS=$(aws --endpoint-url "${ENDPT}" ecs register-task-definition \
            --family "probe-task-def" \
            --requires-compatibilities FARGATE \
            --network-mode awsvpc \
            --cpu 256 --memory 512 \
            --container-definitions \
              '[{"name":"probe","image":"alpine:latest","essential":true}]' \
            --query 'taskDefinition.status' --output text)
          assert_eq "ECS cluster accepts task definition registration" "ACTIVE" \
            "${PROBE_TD_STATUS}"

          # -- Idempotency: plan after apply must show 0 changes ------------------
          terraform -chdir="${TF_DIR}" plan -input=false \
            -var "sim_endpoint=${SIM_ENDPOINT}" -detailed-exitcode
          printf 'PASS  idempotency (plan exit 0)\n'

          terraform -chdir="${TF_DIR}" destroy -auto-approve -input=false -var "sim_endpoint=${SIM_ENDPOINT}"

      # fck-nat NAT-instance path: Launch Template (#439/#433), ENI (#430),
      # IAM ListPolicyVersions (#449/#441) — all fixed upstream.
      - name: terraform apply + resource verification + idempotency + destroy (fck-nat NAT instance)
        run: |
          terraform -chdir="${TF_DIR}" apply -auto-approve -input=false \
            -var "sim_endpoint=${SIM_ENDPOINT}" -var nat_mode=instance

          ENDPT="${SIM_ENDPOINT}"
          VPC_ID=$(terraform  -chdir="${TF_DIR}" output -raw vpc_id)
          ENI_ID=$(terraform  -chdir="${TF_DIR}" output -raw nat_instance_eni_id)

          assert_eq() {
            local label="$1" want="$2" got="$3"
            if [ "${got}" = "${want}" ]; then printf 'PASS  %s\n' "${label}"
            else printf 'FAIL  %s: expected [%s] got [%s]\n' "${label}" "${want}" "${got}"; exit 1; fi
          }

          assert_eq "fck-nat launch template exists" "eddsim-nat" \
            "$(aws --endpoint-url "${ENDPT}" ec2 describe-launch-templates \
              --filters "Name=launch-template-name,Values=eddsim-nat" \
              --query 'LaunchTemplates[0].LaunchTemplateName' --output text)"
          assert_eq "fck-nat ENI exists" "${ENI_ID}" \
            "$(aws --endpoint-url "${ENDPT}" ec2 describe-network-interfaces \
              --network-interface-ids "${ENI_ID}" \
              --query 'NetworkInterfaces[0].NetworkInterfaceId' --output text)"
          assert_eq "fck-nat IAM role exists" "eddsim-nat" \
            "$(aws --endpoint-url "${ENDPT}" iam get-role --role-name eddsim-nat \
              --query 'Role.RoleName' --output text)"
          assert_eq "No managed NAT gateways in instance mode" "0" \
            "$(aws --endpoint-url "${ENDPT}" ec2 describe-nat-gateways \
              --filter "Name=vpc-id,Values=${VPC_ID}" \
              --query "length(NatGateways[?State==\`available\`])" --output text)"

          terraform -chdir="${TF_DIR}" plan -input=false \
            -var "sim_endpoint=${SIM_ENDPOINT}" -var nat_mode=instance -detailed-exitcode
          printf 'PASS  idempotency fck-nat (plan exit 0)\n'

          terraform -chdir="${TF_DIR}" destroy -auto-approve -input=false \
            -var "sim_endpoint=${SIM_ENDPOINT}" -var nat_mode=instance

      # DNS/TLS path: re-apply with enable_dns=true so the module's ACM cert +
      # Route53 validation + HTTPS listener (dns.tf) provision against the sim
      # (64 resources). The two ACM gaps — #421 (wildcard-SAN validation record
      # name) and #420 (cert never reaching ISSUED) — were fixed upstream by #424.
      - name: terraform apply + resource verification + idempotency + destroy (DNS/TLS)
        run: |
          terraform -chdir="${TF_DIR}" apply -auto-approve -input=false \
            -var "sim_endpoint=${SIM_ENDPOINT}" -var enable_dns=true

          # -- read outputs -------------------------------------------------------
          ENDPT="${SIM_ENDPOINT}"

          assert_eq() {
            local label="$1" want="$2" got="$3"
            if [ "${got}" = "${want}" ]; then
              printf 'PASS  %s\n' "${label}"
            else
              printf 'FAIL  %s: expected [%s] got [%s]\n' "${label}" "${want}" "${got}"
              exit 1
            fi
          }

          # -- DNS/TLS-specific assertions ----------------------------------------
          LB_ARN=$(aws --endpoint-url "${ENDPT}" elbv2 describe-load-balancers \
            --query "LoadBalancers[?starts_with(LoadBalancerName,'eddsim')].LoadBalancerArn|[0]" \
            --output text)
          assert_eq "ALB HTTPS listener port 443" "443" \
            "$(aws --endpoint-url "${ENDPT}" elbv2 describe-listeners \
              --load-balancer-arn "${LB_ARN}" \
              --query "Listeners[?Port==\`443\`].Port|[0]" --output text)"
          # ACM cert must reach ISSUED before aws_acm_certificate_validation completes.
          CERT_ARN=$(aws --endpoint-url "${ENDPT}" elbv2 describe-listeners \
            --load-balancer-arn "${LB_ARN}" \
            --query "Listeners[?Port==\`443\`].Certificates[0].CertificateArn|[0]" \
            --output text)
          assert_eq "ACM cert ISSUED" "ISSUED" \
            "$(aws --endpoint-url "${ENDPT}" acm describe-certificate \
              --certificate-arn "${CERT_ARN}" \
              --query 'Certificate.Status' --output text)"
          # HTTP listener must redirect to HTTPS in DNS mode.
          assert_eq "ALB HTTP listener redirects to HTTPS" "redirect" \
            "$(aws --endpoint-url "${ENDPT}" elbv2 describe-listeners \
              --load-balancer-arn "${LB_ARN}" \
              --query "Listeners[?Port==\`80\`].DefaultActions[0].Type|[0]" --output text)"
          # ACM cert must be AMAZON_ISSUED and have both SANs (control-plane + wildcard).
          assert_eq "ACM cert type AMAZON_ISSUED" "AMAZON_ISSUED" \
            "$(aws --endpoint-url "${ENDPT}" acm describe-certificate \
              --certificate-arn "${CERT_ARN}" \
              --query 'Certificate.Type' --output text)"
          assert_eq "ACM cert SAN count 2" "2" \
            "$(aws --endpoint-url "${ENDPT}" acm describe-certificate \
              --certificate-arn "${CERT_ARN}" \
              --query 'length(Certificate.SubjectAlternativeNames)' --output text)"
          assert_eq "ACM cert validation method DNS" "DNS" \
            "$(aws --endpoint-url "${ENDPT}" acm describe-certificate \
              --certificate-arn "${CERT_ARN}" \
              --query 'Certificate.DomainValidationOptions[0].ValidationMethod' --output text)"
          # Route53: control-plane A record and workspace wildcard A record created.
          ZONE_ID=$(aws --endpoint-url "${ENDPT}" route53 list-hosted-zones \
            --query "HostedZones[?contains(Name,'edd-sim')].Id|[0]" \
            --output text | sed 's|/hostedzone/||')
          assert_eq "Route53 control-plane A record exists" "1" \
            "$(aws --endpoint-url "${ENDPT}" route53 list-resource-record-sets \
              --hosted-zone-id "${ZONE_ID}" \
              --query "length(ResourceRecordSets[?Name=='app.edd-sim.example.com.' && Type=='A'])" \
              --output text)"
          assert_eq "Route53 workspace wildcard A record exists" "1" \
            "$(aws --endpoint-url "${ENDPT}" route53 list-resource-record-sets \
              --hosted-zone-id "${ZONE_ID}" \
              --query "length(ResourceRecordSets[?contains(Name,'devbox') && Type=='A'])" \
              --output text)"
          # HTTPS listener SSL policy + forward action (both fixed by sockerless#473 / PR #475).
          assert_eq "ALB HTTPS listener ssl policy TLS13" "ELBSecurityPolicy-TLS13-1-2-2021-06" \
            "$(aws --endpoint-url "${ENDPT}" elbv2 describe-listeners \
              --load-balancer-arn "${LB_ARN}" \
              --query "Listeners[?Port==\`443\`].SslPolicy|[0]" --output text)"
          assert_eq "ALB HTTPS listener forward action" "forward" \
            "$(aws --endpoint-url "${ENDPT}" elbv2 describe-listeners \
              --load-balancer-arn "${LB_ARN}" \
              --query "Listeners[?Port==\`443\`].DefaultActions[0].Type|[0]" --output text)"
          # ALB SG must have a port-443 ingress rule in DNS mode.
          ALB_SG_DNS=$(aws --endpoint-url "${ENDPT}" elbv2 describe-load-balancers \
            --query "LoadBalancers[?starts_with(LoadBalancerName,'eddsim')].SecurityGroups[0]|[0]" \
            --output text)
          assert_eq "ALB SG has port-443 ingress rule (DNS mode)" "1" \
            "$(aws --endpoint-url "${ENDPT}" ec2 describe-security-group-rules \
              --filters "Name=group-id,Values=${ALB_SG_DNS}" \
              --query "length(SecurityGroupRules[?IsEgress==\`false\` && FromPort==\`443\`])" \
              --output text)"
          # ACM cert primary domain name.
          assert_eq "ACM cert primary domain" "app.edd-sim.example.com" \
            "$(aws --endpoint-url "${ENDPT}" acm describe-certificate \
              --certificate-arn "${CERT_ARN}" \
              --query 'Certificate.DomainName' --output text)"
          # Route53 cert validation CNAME records: one per unique domain (app.* and *.devbox.*
          # are unrelated — no CNAME sharing), so exactly 2.
          assert_eq "Route53 cert validation CNAME count 2" "2" \
            "$(aws --endpoint-url "${ENDPT}" route53 list-resource-record-sets \
              --hosted-zone-id "${ZONE_ID}" \
              --query "length(ResourceRecordSets[?Type=='CNAME'])" --output text)"

          # -- Idempotency --------------------------------------------------------
          terraform -chdir="${TF_DIR}" plan -input=false \
            -var "sim_endpoint=${SIM_ENDPOINT}" -var enable_dns=true -detailed-exitcode
          printf 'PASS  idempotency DNS/TLS (plan exit 0)\n'

          terraform -chdir="${TF_DIR}" destroy -auto-approve -input=false \
            -var "sim_endpoint=${SIM_ENDPOINT}" -var enable_dns=true
      - if: always()
        run: docker compose -f docker-compose.tier2.yml down

  shellcheck:
    name: shellcheck
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install shellcheck + zsh
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install shellcheck
          else
            sudo apt-get update && sudo apt-get install -y shellcheck zsh
          fi
      - name: shellcheck + bash/zsh parse on every shell script
        shell: bash
        run: |
          set -euo pipefail
          files=$(git ls-files '*.sh')
          if [ -z "$files" ]; then echo "no shell scripts"; exit 0; fi
          for f in $files; do
            echo "== $f =="
            shellcheck "$f"
            bash -n "$f"
            zsh -n "$f"
          done

  sast:
    name: sast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: pip install semgrep
      - name: Semgrep SAST (fail on high/critical = ERROR severity)
        run: semgrep scan --config p/default --severity ERROR --error --metrics off packages apps services

  vuln-scan:
    name: vuln-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Trivy (deps + IaC + secrets; fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          # Scan only our IaC, not the internals of third-party Terraform modules
          # (e.g. RaJiska/fck-nat) that Trivy would otherwise resolve and scan.
          TRIVY_TF_EXCLUDE_DOWNLOADED_MODULES: "true"
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          exit-code: "1"
          skip-dirs: node_modules
          trivyignores: .trivyignore.yaml
