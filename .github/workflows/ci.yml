# SPDX-License-Identifier: AGPL-3.0-or-later
name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test

  integration:
    name: integration
    runs-on: ubuntu-latest
    services:
      dynamodb-local:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:integ

  check-deps:
    name: check-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - run: pnpm install --frozen-lockfile
      - name: Dependency freshness (Node + Terraform)
        run: bash scripts/check-latest-deps.sh

  terraform:
    name: terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - run: terraform -chdir=infra/terraform fmt -check
      - run: terraform -chdir=infra/terraform init -backend=false -input=false
      - run: terraform -chdir=infra/terraform validate

  shellcheck:
    name: shellcheck
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck + zsh
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install shellcheck
          else
            sudo apt-get update && sudo apt-get install -y shellcheck zsh
          fi
      - name: shellcheck + bash/zsh parse on every shell script
        shell: bash
        run: |
          set -euo pipefail
          files=$(git ls-files '*.sh')
          if [ -z "$files" ]; then echo "no shell scripts"; exit 0; fi
          for f in $files; do
            echo "== $f =="
            shellcheck "$f"
            bash -n "$f"
            zsh -n "$f"
          done

  sast:
    name: sast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install semgrep
      - name: Semgrep SAST (fail on high/critical = ERROR severity)
        run: semgrep scan --config p/default --severity ERROR --error --metrics off packages apps services

  vuln-scan:
    name: vuln-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy (deps + IaC + secrets; fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          exit-code: "1"
          skip-dirs: node_modules
