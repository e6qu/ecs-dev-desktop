# SPDX-License-Identifier: AGPL-3.0-or-later
name: CI

on:
  pull_request:
    branches: [main]
    # `labeled` is included so adding the `ci:macos` label to a PR triggers a run
    # in which the gated macOS full-IDE-flow job (e2e-flow-macos) executes.
    types: [opened, synchronize, reopened, labeled]
  # Manual trigger — runs the expensive macOS/colima full-IDE-flow job
  # (e2e-flow-macos) on demand without paying its cost on every push. The same job
  # also runs on a PR carrying the `ci:macos` label (see its `if:`).
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branch-current:
    name: branch-current
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Check out the PR HEAD (not the auto-merge ref) with full history so the
      # fast-forward check against the base is meaningful.
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Branch fast-forwards into its base
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          CHECK_BRANCH_FETCH: "1"
        run: sh scripts/check-branch-current.sh

  build-test:
    name: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test

  code-health:
    name: code-health
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - run: pnpm install --frozen-lockfile
      # Dead code (unused files/exports/deps) and copy-paste duplication. Both fail
      # the build on regressions; jscpd is gated by the threshold in .jscpd.json.
      - run: pnpm dead-code
      - run: pnpm cpd

  integration:
    name: integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # DynamoDB is served by the sockerless sim (brought up below) at the default
    # endpoint (:4566) — the standalone DynamoDB-Local service was retired once the
    # sim's DynamoDB became conformant (sockerless #641-#644/#648 + CloudTrail
    # #650/#651). Readiness is handled in-harness (`waitForDynamo` in `@edd/db`).
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          submodules: recursive # third_party/sockerless — the sim is built from source
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Retry bring-up: image pulls can transiently hit registry rate limits
      # (public.ecr.aws / Docker Hub) on shared runner IPs.
      - name: Build & start the sockerless AWS simulator (from source, API-only mode)
        run: |
          for attempt in 1 2 3; do
            if docker compose -f docker-compose.tier2.yml up -d --build --wait sockerless-aws; then
              exit 0
            fi
            echo "::warning::sim bring-up failed (attempt ${attempt}); retrying"
            docker compose -f docker-compose.tier2.yml down -v || true
            sleep "$((attempt * 20))"
          done
          exit 1
      - run: pnpm test:integ
      - if: always()
        run: docker compose -f docker-compose.tier2.yml down

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          submodules: recursive # third_party/sockerless — the sim is built from source
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Build test Docker images needed by the e2e tests.
      - name: Build reconciler Docker image
        run: docker build -f services/reconciler/Dockerfile -t edd-reconciler:e2e .
      - name: Build SSH proxy Docker image
        run: docker build -f services/ssh-gateway/Dockerfile.proxy -t edd-ssh-proxy:e2e .
      # Seed a GitHub App into bleephub (coordinate-only App e2e): the seed file +
      # key must exist before compose mounts ./temp/github-app into bleephub.
      - name: Generate the GitHub App seed (bleephub)
        run: sh scripts/gen-sim-github-app.sh
      # Retry harness bring-up: image pulls can transiently hit registry rate
      # limits (public.ecr.aws / Docker Hub) on shared runner IPs.
      - name: Build & start the e2e harness (container-mode sim)
        run: |
          for attempt in 1 2 3; do
            if docker compose -f docker-compose.e2e.yml up -d --build --wait; then
              exit 0
            fi
            echo "::warning::e2e harness bring-up failed (attempt ${attempt}); retrying"
            docker compose -f docker-compose.e2e.yml down -v || true
            sleep "$((attempt * 20))"
          done
          exit 1
      # Registered-key SSH e2e (ssh-proxy.e2e.ts, ssh-wake-chain.e2e.ts) are
      # self-contained: each docker-runs its own workspace node + gateway proxy.
      - name: Build SSH workspace-node Docker image
        run: docker build -f services/ssh-gateway/Dockerfile.node -t edd-workspace-node:e2e .
      - name: Build golden workspace image for e2e
        run: |
          # Golden image collection: build the shared base (build.sh stages the first-party
          # Monaco editor into it), then the omnibus variant FROM it (tagged edd-workspace:e2e —
          # the default the e2e suites launch).
          for attempt in 1 2 3; do
            if infra/images/base/build.sh edd-base:e2e \
              && docker build --build-arg BASE=edd-base:e2e -t edd-workspace:e2e infra/images/omnibus; then
              exit 0
            fi
            echo "::warning::golden image build failed (attempt ${attempt}); retrying"
            sleep "$((attempt * 20))"
          done
          exit 1
      # Source the generated GitHub App coordinates so the coordinate-only App e2e
      # (github-app.e2e.ts) targets the seeded bleephub; turbo passes them through
      # (declared in turbo.json test:e2e env). Absent, that test simply skips.
      - run: . ./temp/github-app/coords.env && pnpm test:e2e
        env:
          RECONCILER_IMAGE: edd-reconciler:e2e
          PROXY_IMAGE: edd-ssh-proxy:e2e
          NODE_IMAGE: edd-workspace-node:e2e
      # LIVE portal browser e2e: the UI tier on the same container-mode path
      # (COMPUTE_PROVIDER=ecs; cloud state provisioned by its webServer command —
      # see apps/web/e2e/start-live-app.sh).
      - name: Install Playwright browser
        uses: ./.github/actions/playwright-cache
      - name: Portal browser lifecycle on real ECS compute
        run: pnpm --filter web test:pw:live
      # Real VS Code in the golden image: load the workbench, compile from the
      # integrated terminal, verify the build artifact (uses edd-workspace:e2e).
      - name: VS Code workspace browser proof
        run: pnpm --filter web test:pw:vscode
      - if: always()
        run: docker compose -f docker-compose.e2e.yml down

  # The same auth + SSH paths, but with the simulators served over TLS (the way
  # real cloud always is). Proves the stack is correct end-to-end over HTTPS with
  # real certificate trust (NODE_EXTRA_CA_CERTS — no --insecure, no skipped verify).
  e2e-https:
    name: e2e-https
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          submodules: recursive # third_party/sockerless — the sims are built from source
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Fresh self-signed CA + server cert into ./temp/sim-tls (gitignored); the
      # sims mount it and the test trusts the CA. No key is committed.
      - name: Generate the sim TLS cert
        run: sh scripts/gen-sim-tls-cert.sh
      # Retry bring-up: image pulls can transiently hit registry rate limits
      # (public.ecr.aws / Docker Hub) on shared runner IPs.
      - name: Build & start the HTTPS simulators (sockerless AWS + Azure + bleephub)
        run: |
          for attempt in 1 2 3; do
            if docker compose -f docker-compose.https.yml up -d --build --wait; then
              exit 0
            fi
            echo "::warning::sim bring-up failed (attempt ${attempt}); retrying"
            docker compose -f docker-compose.https.yml down -v || true
            sleep "$((attempt * 20))"
          done
          exit 1
      # Entra login → group → role over HTTPS: Graph provisioning + ROPC against
      # the TLS azure-sim, with the CA trusted (EDD_SIM_SCHEME=https flips the
      # @edd/config sim base URLs to https). The Auth.js callback-route e2e also
      # runs here: its Entra leg is HTTPS-only (Auth.js re-discovers the issuer
      # for the id_token tid without oauth4webapi's allowInsecureRequests).
      - name: Entra + Auth.js callback routes over HTTPS (mock-free; real CA trust)
        env:
          EDD_SIM_SCHEME: https
          NODE_EXTRA_CA_CERTS: ${{ github.workspace }}/temp/sim-tls/ca.pem
        run: pnpm --filter @edd/web exec vitest run --config vitest.e2e.config.ts lib/entra-auth.e2e.ts lib/nextauth-callback.e2e.ts
      # The real EBS StorageProvider over the AWS SDK against the TLS aws-sim,
      # CA trusted (no --insecure) — the storage/compute SDK path the plain-HTTP
      # tiers exercise, now proven the way real cloud always runs.
      - name: EBS storage adapter over HTTPS (real CA trust)
        env:
          EDD_SIM_SCHEME: https
          NODE_EXTRA_CA_CERTS: ${{ github.workspace }}/temp/sim-tls/ca.pem
        run: pnpm --filter @edd/storage-ec2 test:integ
      - if: always()
        run: docker compose -f docker-compose.https.yml down

  # Build BOTH images the macOS job needs ONCE on Linux (native BuildKit, fast) and
  # publish them to GHCR, so the macOS job pulls instead of building under colima —
  # which is very slow over the VM's disk I/O (the sim build alone took ~55 min) and,
  # for the golden image, fails outright (colima's legacy builder can't do the
  # Dockerfile's `COPY --chmod`, which needs BuildKit). Gated like the macOS job.
  #
  # These are EPHEMERAL CI FIXTURES, NOT RELEASE ARTIFACTS:
  #   * package names are `edd-ci-*` (not the product image names) so they read as
  #     test fixtures, never something to pull/deploy;
  #   * the tag is run-scoped (`ci-<run_id>`), never `latest`/a version, and is
  #     rebuilt from the PR's code every run (no cross-run reuse → never stale);
  #   * each carries an OCI "NOT a release — do not deploy" description label.
  # There is no release pipeline in this repo; nothing consumes these after the run.
  macos-images:
    name: macos-images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'ci:macos')
    permissions:
      contents: read
      packages: write
    env:
      GOLDEN: ghcr.io/${{ github.repository_owner }}/edd-ci-workspace
      SIM: ghcr.io/${{ github.repository_owner }}/edd-ci-sim-aws-exec
      NOT_A_RELEASE: "Ephemeral CI fixture for the e2e-flow-macos job. NOT a release image — do not pull or deploy; rebuilt from PR code every run."
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          submodules: recursive # third_party/sockerless — the sim image is built from source
      # node + pnpm so build.sh can bundle + stage the first-party Monaco editor into the base.
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build & push the golden workspace image (CI fixture)
        run: |
          # Build the shared base (build.sh stages the Monaco editor into it), then the omnibus
          # variant FROM it; push omnibus (base is an intermediate the macOS job doesn't need).
          infra/images/base/build.sh edd-base:ci
          docker build --build-arg BASE=edd-base:ci \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.description=${NOT_A_RELEASE}" \
            -t "${GOLDEN}:ci-${{ github.run_id }}" infra/images/omnibus
          docker push "${GOLDEN}:ci-${{ github.run_id }}"
      - name: Build & push the container-mode AWS sim image (CI fixture)
        run: |
          docker build -f infra/sim/sockerless-aws-exec.Dockerfile \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.description=${NOT_A_RELEASE}" \
            -t "${SIM}:ci-${{ github.run_id }}" third_party/sockerless/simulators
          docker push "${SIM}:ci-${{ github.run_id }}"

  # The SAME full live IDE flow (create a workspace → real ECS task on the
  # container-mode sim → reach the actual OpenVSCode workbench through the bridge),
  # but on a macOS runner. GitHub-hosted macOS has no native Docker, so a Linux
  # container engine is provided by colima; the sim + task containers run in that
  # VM exactly as on Linux (endpoint/coordinate-only — §6.8). macOS minutes are
  # expensive, so this is gated: it runs on `workflow_dispatch` or on a PR labelled
  # `ci:macos` (the Linux `e2e` job runs the same test on every PR via test:e2e).
  #
  # Runner MUST be Intel (macos-15-intel): GitHub's Apple-silicon runners
  # (macos-14/15) do NOT support the nested virtualization colima needs — its `vz`
  # VM driver fails to boot there ("error starting vm"). The Intel runner uses
  # QEMU+HVF and runs an x86_64 Linux VM natively (no emulation). Both container
  # images are pulled from GHCR (built by `macos-images`), never built here.
  e2e-flow-macos:
    name: e2e-flow-macos
    runs-on: macos-15-intel
    timeout-minutes: 25
    needs: macos-images
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'ci:macos')
    permissions:
      contents: read
      packages: read
    env:
      GOLDEN: ghcr.io/${{ github.repository_owner }}/edd-ci-workspace
      SIM: ghcr.io/${{ github.repository_owner }}/edd-ci-sim-aws-exec
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          submodules: recursive # third_party/sockerless — compose references its build context
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Provide a Docker engine on macOS via colima (a lightweight x86_64 Linux VM
      # via QEMU+HVF on the Intel runner). `brew install docker` ships only the CLI,
      # not the Compose v2 plugin, so install docker-compose too and link it as a CLI
      # plugin — otherwise `docker compose` errors with "unknown shorthand flag: 'f'".
      # Generous RAM: the golden workspace container is heavy and must stay running.
      - name: Start Docker engine (colima)
        run: |
          brew install docker docker-compose colima
          mkdir -p ~/.docker/cli-plugins
          ln -sfn "$(brew --prefix)/opt/docker-compose/bin/docker-compose" ~/.docker/cli-plugins/docker-compose
          colima start --cpu 4 --memory 10 --disk 30
          docker context use colima
          docker info
          docker compose version
      # Pull both Linux-built images (no build in colima) and tag them to the local
      # refs the catalog/test/bridge and compose default to.
      - name: Pull prebuilt images from GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker pull "${GOLDEN}:ci-${{ github.run_id }}"
          docker tag "${GOLDEN}:ci-${{ github.run_id }}" edd-workspace:e2e
          docker pull "${SIM}:ci-${{ github.run_id }}"
          docker tag "${SIM}:ci-${{ github.run_id }}" edd-sim-aws-exec:e2e
      # Only the service the IDE flow needs: the container-mode AWS sim (no
      # bleephub/azure). It serves DynamoDB too — the standalone DynamoDB-Local
      # container was retired. `--no-build` uses the pulled sim image.
      - name: Start container-mode sim (prebuilt)
        run: |
          for attempt in 1 2 3; do
            if docker compose -f docker-compose.e2e.yml up -d --no-build --wait sockerless-aws-exec; then
              exit 0
            fi
            echo "::warning::sim bring-up failed (attempt ${attempt}); retrying"
            docker compose -f docker-compose.e2e.yml down -v || true
            sleep "$((attempt * 20))"
          done
          exit 1
      # colima establishes host→VM port forwards asynchronously after `up`, so the
      # published port can lag the container being "started". Confirm the sim is
      # actually reachable from the host before the test (which otherwise fails with
      # a "socket hang up" if its 30s wait starts too early).
      - name: Wait until the sim is reachable from the host
        run: |
          ok=0
          for _ in $(seq 1 90); do
            if curl -s -o /dev/null --max-time 3 http://127.0.0.1:4566/; then echo "sim reachable"; ok=1; break; fi
            sleep 2
          done
          if [ "$ok" != 1 ]; then echo "::error::sim not reachable after wait"; docker ps -a; exit 1; fi
      - name: Full IDE flow e2e (create workspace → real OpenVSCode through the bridge)
        run: pnpm --filter @edd/e2e exec vitest run --config vitest.e2e.config.ts src/live-ide-flow.e2e.ts
      # If the flow fails (e.g. the task container didn't stay up), capture why.
      - if: failure()
        name: Diagnostics (containers + sim logs)
        run: |
          echo "== docker ps -a =="; docker ps -a
          echo "== sim logs =="; docker compose -f docker-compose.e2e.yml logs --tail 120 sockerless-aws-exec || true
          echo "== workspace task logs =="
          for c in $(docker ps -aq --filter ancestor=edd-workspace:e2e); do
            echo "--- $c ---"; docker logs --tail 80 "$c" 2>&1 || true
          done
      - if: always()
        run: docker compose -f docker-compose.e2e.yml down -v || true

  playwright:
    name: playwright
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          submodules: recursive # third_party/sockerless — the sim serves the portal's DynamoDB
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - run: pnpm install --frozen-lockfile
      # DynamoDB is served by the process-mode sim (the standalone DynamoDB-Local
      # container was retired); the portal's web app targets it at :4566.
      - name: Build & start the sockerless AWS simulator (from source, API-only mode)
        run: |
          for attempt in 1 2 3; do
            if docker compose -f docker-compose.tier2.yml up -d --build --wait sockerless-aws; then
              exit 0
            fi
            echo "::warning::sim bring-up failed (attempt ${attempt}); retrying"
            docker compose -f docker-compose.tier2.yml down -v || true
            sleep "$((attempt * 20))"
          done
          exit 1
      - name: Install Playwright browser
        uses: ./.github/actions/playwright-cache
      # test:pw builds + starts the app (its webServer) and creates the table in
      # global-setup, then drives the browser through the RBAC-gated portal flows.
      - run: pnpm --filter web test:pw
      - if: always()
        run: docker compose -f docker-compose.tier2.yml down

  check-deps:
    name: check-deps
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_wrapper: false
      - run: pnpm install --frozen-lockfile
      - name: Dependency freshness (Node + Terraform)
        run: bash scripts/check-latest-deps.sh

  terraform:
    name: terraform
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_wrapper: false
      - run: terraform fmt -check -recursive infra/terraform
      # `terraform validate` on the module STANDALONE is not possible: it declares
      # `configuration_aliases = [aws.us_east_1]` for the CloudFront/us-east-1 cert +
      # CLOUDFRONT-scope WAF resources, and an aliased provider config can only be
      # supplied by a parent. `init` still checks the provider/version constraints and
      # that the config parses; the module's `validate` runs transitively through the
      # complete example below (which passes both providers).
      - name: Init the platform module (parse + provider constraints)
        run: terraform -chdir=infra/terraform/modules/ecs-dev-desktop init -backend=false -input=false
      - name: Validate the complete example (validates the module transitively)
        run: |
          terraform -chdir=infra/terraform/examples/complete init -backend=false -input=false
          terraform -chdir=infra/terraform/examples/complete validate
      # The sim-backed test (tests/sim) runs in its own `terraform-sim` job below.

  terraform-sim:
    name: terraform-sim
    runs-on: ubuntu-latest
    # Defensive cap (sim build + full apply+destroy against the sim).
    timeout-minutes: 25
    env:
      # tests/sim defaults sim_endpoint to this; kept explicit for the apply step.
      SIM_ENDPOINT: http://127.0.0.1:4566
      TF_DIR: infra/terraform/modules/ecs-dev-desktop/tests/sim
      # Dummy creds + region for the AWS CLI (simulate-principal-policy assertions).
      # The sim ignores credential values; region must be set explicitly.
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          submodules: recursive # third_party/sockerless — the sim is built from source
      - uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_wrapper: false
      - uses: actions/cache@v6.1.0
        with:
          path: ${{ env.TF_DIR }}/.terraform/providers
          key: tf-providers-${{ runner.os }}-${{ hashFiles('infra/terraform/modules/ecs-dev-desktop/.terraform.lock.hcl', 'infra/terraform/modules/ecs-dev-desktop/tests/sim/.terraform.lock.hcl') }}
      # Retry bring-up: image pulls can transiently hit registry rate limits
      # (public.ecr.aws / Docker Hub) on shared runner IPs.
      - name: Build & start the sockerless AWS simulator (from source, API-only mode)
        run: |
          for attempt in 1 2 3; do
            if docker compose -f docker-compose.tier2.yml -f docker-compose.tier2.host.yml up -d --build --wait sockerless-aws; then
              exit 0
            fi
            echo "::warning::sim bring-up failed (attempt ${attempt}); retrying"
            docker compose -f docker-compose.tier2.yml -f docker-compose.tier2.host.yml down -v || true
            sleep "$((attempt * 20))"
          done
          exit 1
      - name: Wait until the sim AWS API is reachable
        run: |
          ok=0
          for _ in $(seq 1 90); do
            if curl -s -o /dev/null --max-time 3 http://127.0.0.1:4566/; then echo "sim reachable"; ok=1; break; fi
            sleep 2
          done
          if [ "$ok" != 1 ]; then echo "::error::sim not reachable after wait"; docker ps -a; exit 1; fi
      - name: terraform init + validate
        run: |
          terraform -chdir="${TF_DIR}" init -input=false
          terraform -chdir="${TF_DIR}" validate
      # Full non-mocked apply+destroy against the LIVE sim every PR — provisions
      # the entire platform stack (VPC + NAT, KMS, DynamoDB single-table w/ GSIs,
      # ECR, ECS cluster + Fargate service + capacity providers + autoscaling,
      # ALB, IAM, scheduler, logs) and tears it down. Per AGENTS.md §6.8 the only
      # difference from a real-cloud apply is the provider endpoints + dummy creds.
      # Post-apply: resource verification across all services + IAM simulation +
      # CloudTrail provisioning-event audit (CreateTable/CreateCluster/CreateKey/
      # CreateLogGroup/CreateRepository/CreateRole/CreateSchedule) + functional
      # probes (DynamoDB write/read, CloudWatch Logs write/read, ECS task-def
      # registration) + idempotency (plan -detailed-exitcode = 0).
      # Four active configurations: default (100+ assertions), fck-nat, DNS/TLS.
      # All assertions active (no open upstream blockers).
      - name: terraform apply + resource verification + IAM simulation + idempotency + destroy (default stack)
        run: |
          terraform -chdir="${TF_DIR}" apply -auto-approve -input=false -var "sim_endpoint=${SIM_ENDPOINT}"

          # -- read outputs -------------------------------------------------------
          ENDPT="${SIM_ENDPOINT}"
          TABLE_NAME=$(terraform -chdir="${TF_DIR}" output -raw dynamodb_table_name)
          TABLE_ARN=$(terraform  -chdir="${TF_DIR}" output -raw dynamodb_table_arn)
          KMS_ARN=$(terraform    -chdir="${TF_DIR}" output -raw kms_key_arn)
          CLUSTER=$(terraform    -chdir="${TF_DIR}" output -raw ecs_cluster_name)
          CLUSTER_ARN=$(terraform -chdir="${TF_DIR}" output -raw ecs_cluster_arn)
          VPC_ID=$(terraform     -chdir="${TF_DIR}" output -raw vpc_id)
          CTRL_ROLE=$(terraform  -chdir="${TF_DIR}" output -raw control_plane_task_role_arn)
          ALB_SG=$(terraform    -chdir="${TF_DIR}" output -raw alb_security_group_id)
          TASKS_SG=$(terraform  -chdir="${TF_DIR}" output -raw tasks_security_group_id)

          # -- helpers ------------------------------------------------------------
          assert_eq() {
            local label="$1" want="$2" got="$3"
            if [ "${got}" = "${want}" ]; then
              printf 'PASS  %s\n' "${label}"
            else
              printf 'FAIL  %s: expected [%s] got [%s]\n' "${label}" "${want}" "${got}"
              exit 1
            fi
          }

          assert_iam() {
            local label="$1" want="$2"
            shift 2
            got=$(aws --endpoint-url "${ENDPT}" iam simulate-principal-policy \
              --policy-source-arn "${CTRL_ROLE}" "$@" \
              --query 'EvaluationResults[0].EvalDecision' --output text)
            if [ "${got}" = "${want}" ]; then
              printf 'PASS  %s\n' "${label}"
            else
              printf 'FAIL  %s: expected %s, got %s\n' "${label}" "${want}" "${got}"
              exit 1
            fi
          }

          # -- DynamoDB -----------------------------------------------------------
          assert_eq "DynamoDB table ACTIVE" "ACTIVE" \
            "$(aws --endpoint-url "${ENDPT}" dynamodb describe-table \
              --table-name "${TABLE_NAME}" \
              --query 'Table.TableStatus' --output text)"
          assert_eq "DynamoDB billing PAY_PER_REQUEST" "PAY_PER_REQUEST" \
            "$(aws --endpoint-url "${ENDPT}" dynamodb describe-table \
              --table-name "${TABLE_NAME}" \
              --query 'Table.BillingModeSummary.BillingMode' --output text)"
          assert_eq "DynamoDB GSI count 2" "2" \
            "$(aws --endpoint-url "${ENDPT}" dynamodb describe-table \
              --table-name "${TABLE_NAME}" \
              --query 'length(Table.GlobalSecondaryIndexes)' --output text)"

          # -- KMS ----------------------------------------------------------------
          # Extract key ID from the ARN (last path segment).
          KMS_KEY_ID="${KMS_ARN##*/}"
          assert_eq "KMS key Enabled" "Enabled" \
            "$(aws --endpoint-url "${ENDPT}" kms describe-key --key-id "${KMS_KEY_ID}" \
              --query 'KeyMetadata.KeyState' --output text)"
          assert_eq "KMS rotation enabled" "True" \
            "$(aws --endpoint-url "${ENDPT}" kms get-key-rotation-status \
              --key-id "${KMS_KEY_ID}" \
              --query 'KeyRotationEnabled' --output text)"
          assert_eq "KMS alias exists" "1" \
            "$(aws --endpoint-url "${ENDPT}" kms list-aliases \
              --query "length(Aliases[?AliasName=='alias/eddsim-ecs-dev-desktop'])" --output text)"
          assert_eq "KMS key usage ENCRYPT_DECRYPT" "ENCRYPT_DECRYPT" \
            "$(aws --endpoint-url "${ENDPT}" kms describe-key --key-id "${KMS_KEY_ID}" \
              --query 'KeyMetadata.KeyUsage' --output text)"
          assert_eq "KMS key origin AWS_KMS" "AWS_KMS" \
            "$(aws --endpoint-url "${ENDPT}" kms describe-key --key-id "${KMS_KEY_ID}" \
              --query 'KeyMetadata.Origin' --output text)"

          # -- ECR ----------------------------------------------------------------
          assert_eq "ECR control-plane repo exists" "eddsim/control-plane" \
            "$(aws --endpoint-url "${ENDPT}" ecr describe-repositories \
              --repository-names "eddsim/control-plane" \
              --query 'repositories[0].repositoryName' --output text)"
          assert_eq "ECR golden/typescript repo exists" "eddsim/golden/typescript" \
            "$(aws --endpoint-url "${ENDPT}" ecr describe-repositories \
              --repository-names "eddsim/golden/typescript" \
              --query 'repositories[0].repositoryName' --output text)"
          assert_eq "ECR edd-base repo exists" "eddsim/edd-base" \
            "$(aws --endpoint-url "${ENDPT}" ecr describe-repositories \
              --repository-names "eddsim/edd-base" \
              --query 'repositories[0].repositoryName' --output text)"
          assert_eq "ECR ssh-gateway repo exists" "eddsim/ssh-gateway" \
            "$(aws --endpoint-url "${ENDPT}" ecr describe-repositories \
              --repository-names "eddsim/ssh-gateway" \
              --query 'repositories[0].repositoryName' --output text)"
          aws --endpoint-url "${ENDPT}" ecr get-lifecycle-policy \
            --repository-name "eddsim/control-plane" \
            --query 'lifecyclePolicyText' --output text > /dev/null
          printf 'PASS  ECR control-plane lifecycle policy\n'
          aws --endpoint-url "${ENDPT}" ecr get-lifecycle-policy \
            --repository-name "eddsim/golden/typescript" \
            --query 'lifecyclePolicyText' --output text > /dev/null
          printf 'PASS  ECR golden/typescript lifecycle policy\n'
          aws --endpoint-url "${ENDPT}" ecr get-lifecycle-policy \
            --repository-name "eddsim/edd-base" \
            --query 'lifecyclePolicyText' --output text > /dev/null
          printf 'PASS  ECR edd-base lifecycle policy\n'
          assert_eq "ECR control-plane scan-on-push enabled" "True" \
            "$(aws --endpoint-url "${ENDPT}" ecr describe-repositories \
              --repository-names "eddsim/control-plane" \
              --query 'repositories[0].imageScanningConfiguration.scanOnPush' --output text)"
          assert_eq "ECR control-plane encryption type KMS" "KMS" \
            "$(aws --endpoint-url "${ENDPT}" ecr describe-repositories \
              --repository-names "eddsim/control-plane" \
              --query 'repositories[0].encryptionConfiguration.encryptionType' --output text)"
          assert_eq "ECR control-plane imageTagMutability MUTABLE" "MUTABLE" \
            "$(aws --endpoint-url "${ENDPT}" ecr describe-repositories \
              --repository-names "eddsim/control-plane" \
              --query 'repositories[0].imageTagMutability' --output text)"
          assert_eq "ECR control-plane kmsKey matches" "${KMS_ARN}" \
            "$(aws --endpoint-url "${ENDPT}" ecr describe-repositories \
              --repository-names "eddsim/control-plane" \
              --query 'repositories[0].encryptionConfiguration.kmsKey' --output text)"
          assert_eq "ECR golden/typescript scan-on-push enabled" "True" \
            "$(aws --endpoint-url "${ENDPT}" ecr describe-repositories \
              --repository-names "eddsim/golden/typescript" \
              --query 'repositories[0].imageScanningConfiguration.scanOnPush' --output text)"
          assert_eq "ECR golden/typescript encryption type KMS" "KMS" \
            "$(aws --endpoint-url "${ENDPT}" ecr describe-repositories \
              --repository-names "eddsim/golden/typescript" \
              --query 'repositories[0].encryptionConfiguration.encryptionType' --output text)"
          assert_eq "ECR golden/typescript imageTagMutability IMMUTABLE" "IMMUTABLE" \
            "$(aws --endpoint-url "${ENDPT}" ecr describe-repositories \
              --repository-names "eddsim/golden/typescript" \
              --query 'repositories[0].imageTagMutability' --output text)"
          assert_eq "ECR golden/typescript kmsKey matches" "${KMS_ARN}" \
            "$(aws --endpoint-url "${ENDPT}" ecr describe-repositories \
              --repository-names "eddsim/golden/typescript" \
              --query 'repositories[0].encryptionConfiguration.kmsKey' --output text)"
          assert_eq "ECR edd-base scan-on-push enabled" "True" \
            "$(aws --endpoint-url "${ENDPT}" ecr describe-repositories \
              --repository-names "eddsim/edd-base" \
              --query 'repositories[0].imageScanningConfiguration.scanOnPush' --output text)"
          assert_eq "ECR edd-base encryption type KMS" "KMS" \
            "$(aws --endpoint-url "${ENDPT}" ecr describe-repositories \
              --repository-names "eddsim/edd-base" \
              --query 'repositories[0].encryptionConfiguration.encryptionType' --output text)"
          assert_eq "ECR edd-base imageTagMutability IMMUTABLE" "IMMUTABLE" \
            "$(aws --endpoint-url "${ENDPT}" ecr describe-repositories \
              --repository-names "eddsim/edd-base" \
              --query 'repositories[0].imageTagMutability' --output text)"
          assert_eq "ECR edd-base kmsKey matches" "${KMS_ARN}" \
            "$(aws --endpoint-url "${ENDPT}" ecr describe-repositories \
              --repository-names "eddsim/edd-base" \
              --query 'repositories[0].encryptionConfiguration.kmsKey' --output text)"

          # -- ECS ----------------------------------------------------------------
          assert_eq "ECS cluster ACTIVE" "ACTIVE" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-clusters \
              --clusters "${CLUSTER}" \
              --query 'clusters[0].status' --output text)"
          assert_eq "ECS cluster capacity provider count 2" "2" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-clusters \
              --clusters "${CLUSTER}" \
              --query 'length(clusters[0].capacityProviders)' --output text)"
          assert_eq "ECS default capacity provider FARGATE" "FARGATE" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-clusters \
              --clusters "${CLUSTER}" \
              --query 'clusters[0].defaultCapacityProviderStrategy[0].capacityProvider' --output text)"
          assert_eq "ECS task-definition family count 2" "2" \
            "$(aws --endpoint-url "${ENDPT}" ecs list-task-definition-families \
              --family-prefix "eddsim" \
              --query 'length(families)' --output text)"
          assert_eq "ECS control-plane service ACTIVE" "ACTIVE" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-services \
              --cluster "${CLUSTER}" --services "eddsim-control-plane" \
              --query 'services[0].status' --output text)"
          assert_eq "ECS service launch type FARGATE" "FARGATE" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-services \
              --cluster "${CLUSTER}" --services "eddsim-control-plane" \
              --query 'services[0].launchType' --output text)"
          assert_eq "ECS cluster containerInsights enabled" "enabled" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-clusters \
              --clusters "${CLUSTER}" --include SETTINGS \
              --query "clusters[0].settings[?name=='containerInsights'].value|[0]" --output text)"
          assert_eq "ECS cluster executeCommand KMS key set" "${KMS_ARN}" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-clusters \
              --clusters "${CLUSTER}" --include CONFIGURATIONS \
              --query 'clusters[0].configuration.executeCommandConfiguration.kmsKeyId' --output text)"
          assert_eq "ECS control-plane task-def CPU 512" "512" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-task-definition \
              --task-definition "eddsim-control-plane" \
              --query 'taskDefinition.cpu' --output text)"
          assert_eq "ECS control-plane task-def memory 1024" "1024" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-task-definition \
              --task-definition "eddsim-control-plane" \
              --query 'taskDefinition.memory' --output text)"
          assert_eq "ECS control-plane task-def network awsvpc" "awsvpc" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-task-definition \
              --task-definition "eddsim-control-plane" \
              --query 'taskDefinition.networkMode' --output text)"
          assert_eq "ECS service desired count 2" "2" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-services \
              --cluster "${CLUSTER}" --services "eddsim-control-plane" \
              --query 'services[0].desiredCount' --output text)"
          assert_eq "ECS service assign public IP DISABLED" "DISABLED" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-services \
              --cluster "${CLUSTER}" --services "eddsim-control-plane" \
              --query 'services[0].networkConfiguration.awsvpcConfiguration.assignPublicIp' --output text)"
          assert_eq "ECS service deploymentCircuitBreaker enabled" "True" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-services \
              --cluster "${CLUSTER}" --services "eddsim-control-plane" \
              --query 'services[0].deploymentConfiguration.deploymentCircuitBreaker.enable' --output text)"
          assert_eq "ECS service deploymentCircuitBreaker rollback enabled" "True" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-services \
              --cluster "${CLUSTER}" --services "eddsim-control-plane" \
              --query 'services[0].deploymentConfiguration.deploymentCircuitBreaker.rollback' --output text)"

          # -- ECS task-definition container details --------------------------------
          assert_eq "ECS control-plane container essential" "True" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-task-definition \
              --task-definition "eddsim-control-plane" \
              --query 'taskDefinition.containerDefinitions[0].essential' --output text)"
          assert_eq "ECS control-plane container port 3000" "3000" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-task-definition \
              --task-definition "eddsim-control-plane" \
              --query 'taskDefinition.containerDefinitions[0].portMappings[0].containerPort' --output text)"
          assert_eq "ECS control-plane container log driver awslogs" "awslogs" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-task-definition \
              --task-definition "eddsim-control-plane" \
              --query 'taskDefinition.containerDefinitions[0].logConfiguration.logDriver' --output text)"
          assert_eq "ECS control-plane healthCheck interval 10" "10" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-task-definition \
              --task-definition "eddsim-control-plane" \
              --query 'taskDefinition.containerDefinitions[0].healthCheck.interval' --output text)"
          assert_eq "ECS control-plane healthCheck timeout 5" "5" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-task-definition \
              --task-definition "eddsim-control-plane" \
              --query 'taskDefinition.containerDefinitions[0].healthCheck.timeout' --output text)"
          assert_eq "ECS control-plane env NODE_ENV production" "production" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-task-definition \
              --task-definition "eddsim-control-plane" \
              --query "taskDefinition.containerDefinitions[0].environment[?name==\`NODE_ENV\`].value|[0]" \
              --output text)"
          assert_eq "ECS control-plane env DYNAMODB_TABLE set" "${TABLE_NAME}" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-task-definition \
              --task-definition "eddsim-control-plane" \
              --query "taskDefinition.containerDefinitions[0].environment[?name==\`DYNAMODB_TABLE\`].value|[0]" \
              --output text)"
          assert_eq "ECS control-plane env ECS_CLUSTER set" "${CLUSTER}" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-task-definition \
              --task-definition "eddsim-control-plane" \
              --query "taskDefinition.containerDefinitions[0].environment[?name==\`ECS_CLUSTER\`].value|[0]" \
              --output text)"
          assert_eq "ECS reconciler task-def CPU 256" "256" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-task-definition \
              --task-definition "eddsim-reconciler" \
              --query 'taskDefinition.cpu' --output text)"
          assert_eq "ECS reconciler task-def memory 512" "512" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-task-definition \
              --task-definition "eddsim-reconciler" \
              --query 'taskDefinition.memory' --output text)"
          assert_eq "ECS reconciler container log driver awslogs" "awslogs" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-task-definition \
              --task-definition "eddsim-reconciler" \
              --query 'taskDefinition.containerDefinitions[0].logConfiguration.logDriver' --output text)"
          assert_eq "ECS cluster capacity provider strategy weight 1" "1" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-clusters \
              --clusters "${CLUSTER}" \
              --query 'clusters[0].defaultCapacityProviderStrategy[0].weight' --output text)"
          assert_eq "ECS cluster capacity provider strategy base 1" "1" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-clusters \
              --clusters "${CLUSTER}" \
              --query 'clusters[0].defaultCapacityProviderStrategy[0].base' --output text)"
          assert_eq "ECS cluster has FARGATE_SPOT provider" "FARGATE_SPOT" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-clusters \
              --clusters "${CLUSTER}" \
              --query "clusters[0].capacityProviders[?@==\`FARGATE_SPOT\`]|[0]" --output text)"

          # -- ECS service load balancer + network ----------------------------------
          assert_eq "ECS service load balancer count 1" "1" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-services \
              --cluster "${CLUSTER}" --services "eddsim-control-plane" \
              --query 'length(services[0].loadBalancers)' --output text)"
          assert_eq "ECS service LB container name control-plane" "control-plane" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-services \
              --cluster "${CLUSTER}" --services "eddsim-control-plane" \
              --query 'services[0].loadBalancers[0].containerName' --output text)"
          assert_eq "ECS service LB container port 3000" "3000" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-services \
              --cluster "${CLUSTER}" --services "eddsim-control-plane" \
              --query 'services[0].loadBalancers[0].containerPort' --output text)"
          assert_eq "ECS service subnets count 2" "2" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-services \
              --cluster "${CLUSTER}" --services "eddsim-control-plane" \
              --query 'length(services[0].networkConfiguration.awsvpcConfiguration.subnets)' --output text)"
          assert_eq "ECS service security groups count 1" "1" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-services \
              --cluster "${CLUSTER}" --services "eddsim-control-plane" \
              --query 'length(services[0].networkConfiguration.awsvpcConfiguration.securityGroups)' --output text)"

          # -- AppAutoScaling -----------------------------------------------------
          # The control-plane service is registered as a scalable target (min=0, max)
          # but carries NO scaling policy: the reconciler (idle shutdown) + wake Lambda
          # (scale-from-zero) are the sole authority over desiredCount, so a CPU
          # target-tracking policy (which can neither scale to/from 0 nor coexist with
          # them) was removed. Assert the target + its scale-to-zero bounds, and that
          # no scaling policy exists.
          assert_eq "AppAutoScaling target registered" "1" \
            "$(aws --endpoint-url "${ENDPT}" application-autoscaling describe-scalable-targets \
              --service-namespace ecs \
              --query 'length(ScalableTargets)' --output text)"
          assert_eq "AppAutoScaling has no scaling policy (reconciler/wake own desiredCount)" "0" \
            "$(aws --endpoint-url "${ENDPT}" application-autoscaling describe-scaling-policies \
              --service-namespace ecs \
              --query 'length(ScalingPolicies)' --output text)"
          # min capacity is 0: the control plane scales to zero when idle (the wake
          # Lambda + reconciler idle-shutdown drive desiredCount between 0 and the
          # active count). control_plane_min_count defaults to 0.
          assert_eq "AppAutoScaling min capacity 0 (scale-to-zero)" "0" \
            "$(aws --endpoint-url "${ENDPT}" application-autoscaling describe-scalable-targets \
              --service-namespace ecs \
              --query 'ScalableTargets[0].MinCapacity' --output text)"
          assert_eq "AppAutoScaling max capacity 10" "10" \
            "$(aws --endpoint-url "${ENDPT}" application-autoscaling describe-scalable-targets \
              --service-namespace ecs \
              --query 'ScalableTargets[0].MaxCapacity' --output text)"

          # -- EventBridge Scheduler ----------------------------------------------
          assert_eq "Scheduler reconciler ENABLED" "ENABLED" \
            "$(aws --endpoint-url "${ENDPT}" scheduler get-schedule \
              --name "eddsim-reconciler" \
              --query 'State' --output text)"
          assert_eq "Scheduler target is ECS cluster" "${CLUSTER_ARN}" \
            "$(aws --endpoint-url "${ENDPT}" scheduler get-schedule \
              --name "eddsim-reconciler" \
              --query 'Target.Arn' --output text)"
          assert_eq "Scheduler ECS launch type FARGATE" "FARGATE" \
            "$(aws --endpoint-url "${ENDPT}" scheduler get-schedule \
              --name "eddsim-reconciler" \
              --query 'Target.EcsParameters.LaunchType' --output text)"
          assert_eq "Scheduler schedule expression rate(5 minutes)" "rate(5 minutes)" \
            "$(aws --endpoint-url "${ENDPT}" scheduler get-schedule \
              --name "eddsim-reconciler" \
              --query 'ScheduleExpression' --output text)"
          assert_eq "Scheduler max retry attempts 1" "1" \
            "$(aws --endpoint-url "${ENDPT}" scheduler get-schedule \
              --name "eddsim-reconciler" \
              --query 'Target.RetryPolicy.MaximumRetryAttempts' --output text)"
          assert_eq "Scheduler timezone UTC" "UTC" \
            "$(aws --endpoint-url "${ENDPT}" scheduler get-schedule \
              --name "eddsim-reconciler" \
              --query 'ScheduleExpressionTimezone' --output text)"
          assert_eq "Scheduler flexible time window OFF" "OFF" \
            "$(aws --endpoint-url "${ENDPT}" scheduler get-schedule \
              --name "eddsim-reconciler" \
              --query 'FlexibleTimeWindow.Mode' --output text)"
          assert_eq "Scheduler task count 1" "1" \
            "$(aws --endpoint-url "${ENDPT}" scheduler get-schedule \
              --name "eddsim-reconciler" \
              --query 'Target.EcsParameters.TaskCount' --output text)"
          assert_eq "Scheduler network assign public IP DISABLED" "DISABLED" \
            "$(aws --endpoint-url "${ENDPT}" scheduler get-schedule \
              --name "eddsim-reconciler" \
              --query 'Target.EcsParameters.NetworkConfiguration.awsvpcConfiguration.AssignPublicIp' \
              --output text)"
          assert_eq "Scheduler network subnets count 2" "2" \
            "$(aws --endpoint-url "${ENDPT}" scheduler get-schedule \
              --name "eddsim-reconciler" \
              --query 'length(Target.EcsParameters.NetworkConfiguration.awsvpcConfiguration.Subnets)' \
              --output text)"
          assert_eq "Scheduler network security groups count 1" "1" \
            "$(aws --endpoint-url "${ENDPT}" scheduler get-schedule \
              --name "eddsim-reconciler" \
              --query 'length(Target.EcsParameters.NetworkConfiguration.awsvpcConfiguration.SecurityGroups)' \
              --output text)"

          # -- CloudWatch Logs ----------------------------------------------------
          assert_eq "CW log group count 3" "3" \
            "$(aws --endpoint-url "${ENDPT}" logs describe-log-groups \
              --log-group-name-prefix "/eddsim" \
              --query 'length(logGroups)' --output text)"
          assert_eq "CW control-plane log group retention 30d" "30" \
            "$(aws --endpoint-url "${ENDPT}" logs describe-log-groups \
              --log-group-name-prefix "/eddsim/control-plane" \
              --query 'logGroups[0].retentionInDays' --output text)"
          assert_eq "CW control-plane log group kmsKeyId set" "${KMS_ARN}" \
            "$(aws --endpoint-url "${ENDPT}" logs describe-log-groups \
              --log-group-name-prefix "/eddsim/control-plane" \
              --query 'logGroups[0].kmsKeyId' --output text)"
          assert_eq "CW reconciler log group retention 30d" "30" \
            "$(aws --endpoint-url "${ENDPT}" logs describe-log-groups \
              --log-group-name-prefix "/eddsim/reconciler" \
              --query 'logGroups[0].retentionInDays' --output text)"
          assert_eq "CW reconciler log group kmsKeyId set" "${KMS_ARN}" \
            "$(aws --endpoint-url "${ENDPT}" logs describe-log-groups \
              --log-group-name-prefix "/eddsim/reconciler" \
              --query 'logGroups[0].kmsKeyId' --output text)"
          assert_eq "CW workspaces log group retention 30d" "30" \
            "$(aws --endpoint-url "${ENDPT}" logs describe-log-groups \
              --log-group-name-prefix "/eddsim/workspaces" \
              --query 'logGroups[0].retentionInDays' --output text)"
          assert_eq "CW workspaces log group kmsKeyId set" "${KMS_ARN}" \
            "$(aws --endpoint-url "${ENDPT}" logs describe-log-groups \
              --log-group-name-prefix "/eddsim/workspaces" \
              --query 'logGroups[0].kmsKeyId' --output text)"
          assert_eq "CW control-plane log group name" "/eddsim/control-plane" \
            "$(aws --endpoint-url "${ENDPT}" logs describe-log-groups \
              --log-group-name-prefix "/eddsim/control-plane" \
              --query 'logGroups[0].logGroupName' --output text)"
          assert_eq "CW reconciler log group name" "/eddsim/reconciler" \
            "$(aws --endpoint-url "${ENDPT}" logs describe-log-groups \
              --log-group-name-prefix "/eddsim/reconciler" \
              --query 'logGroups[0].logGroupName' --output text)"
          assert_eq "CW workspaces log group name" "/eddsim/workspaces" \
            "$(aws --endpoint-url "${ENDPT}" logs describe-log-groups \
              --log-group-name-prefix "/eddsim/workspaces" \
              --query 'logGroups[0].logGroupName' --output text)"

          # -- ALB + listeners + target group -------------------------------------
          LB_ARN=$(aws --endpoint-url "${ENDPT}" elbv2 describe-load-balancers \
            --query "LoadBalancers[?starts_with(LoadBalancerName,'eddsim-cp')].LoadBalancerArn|[0]" \
            --output text)
          assert_eq "ALB state active" "active" \
