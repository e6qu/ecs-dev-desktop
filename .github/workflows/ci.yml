# SPDX-License-Identifier: AGPL-3.0-or-later
name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branch-current:
    name: branch-current
    runs-on: ubuntu-latest
    steps:
      # Check out the PR HEAD (not the auto-merge ref) with full history so the
      # fast-forward check against the base is meaningful.
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Branch fast-forwards into its base
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          CHECK_BRANCH_FETCH: "1"
        run: sh scripts/check-branch-current.sh

  build-test:
    name: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v6.0.8
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test

  code-health:
    name: code-health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v6.0.8
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Dead code (unused files/exports/deps) and copy-paste duplication. Both fail
      # the build on regressions; jscpd is gated by the threshold in .jscpd.json.
      - run: pnpm dead-code
      - run: pnpm cpd

  integration:
    name: integration
    runs-on: ubuntu-latest
    services:
      # Readiness is handled in-harness (`waitForDynamo` in `@edd/db`, called by
      # ensureTable/dropTable), so the suite never races a still-starting container
      # — no container health-check tooling needed.
      dynamodb-local:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          submodules: recursive # third_party/sockerless — the sim is built from source
      - uses: pnpm/action-setup@v6.0.8
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Retry bring-up: image pulls can transiently hit registry rate limits
      # (public.ecr.aws / Docker Hub) on shared runner IPs.
      - name: Build & start the sockerless AWS simulator (from source, API-only mode)
        run: |
          for attempt in 1 2 3; do
            if docker compose -f docker-compose.tier2.yml up -d --build --wait sockerless-aws; then
              exit 0
            fi
            echo "::warning::sim bring-up failed (attempt ${attempt}); retrying"
            docker compose -f docker-compose.tier2.yml down -v || true
            sleep "$((attempt * 20))"
          done
          exit 1
      - run: pnpm test:integ
      - if: always()
        run: docker compose -f docker-compose.tier2.yml down

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          submodules: recursive # third_party/sockerless — the sim is built from source
      - uses: pnpm/action-setup@v6.0.8
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Retry harness bring-up: image pulls can transiently hit registry rate
      # limits (public.ecr.aws / Docker Hub) on shared runner IPs.
      - name: Build & start the e2e harness (container-mode sim + DynamoDB Local)
        run: |
          for attempt in 1 2 3; do
            if docker compose -f docker-compose.e2e.yml up -d --build --wait; then
              exit 0
            fi
            echo "::warning::e2e harness bring-up failed (attempt ${attempt}); retrying"
            docker compose -f docker-compose.e2e.yml down -v || true
            sleep "$((attempt * 20))"
          done
          exit 1
      - name: Build & start the SSH harness (real Teleport cluster)
        run: |
          for attempt in 1 2 3; do
            if docker compose -f docker-compose.ssh.yml up -d --build --wait; then
              exit 0
            fi
            echo "::warning::SSH harness bring-up failed (attempt ${attempt}); retrying"
            docker compose -f docker-compose.ssh.yml down -v || true
            sleep "$((attempt * 20))"
          done
          exit 1
      - run: pnpm test:e2e
      - if: always()
        run: docker compose -f docker-compose.e2e.yml down
      - if: always()
        run: docker compose -f docker-compose.ssh.yml down

  # The same auth + SSH paths, but with the simulators served over TLS (the way
  # real cloud always is). Proves the stack is correct end-to-end over HTTPS with
  # real certificate trust (NODE_EXTRA_CA_CERTS — no --insecure, no skipped verify).
  e2e-https:
    name: e2e-https
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          submodules: recursive # third_party/sockerless — the sims are built from source
      - uses: pnpm/action-setup@v6.0.8
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Fresh self-signed CA + server cert into ./temp/sim-tls (gitignored); the
      # sims mount it and the test trusts the CA. No key is committed.
      - name: Generate the sim TLS cert
        run: sh scripts/gen-sim-tls-cert.sh
      # Retry bring-up: image pulls can transiently hit registry rate limits
      # (public.ecr.aws / Docker Hub) on shared runner IPs.
      - name: Build & start the sockerless sims over TLS (HTTPS harness)
        run: |
          for attempt in 1 2 3; do
            if docker compose -f docker-compose.https.yml up -d --build --wait; then
              exit 0
            fi
            echo "::warning::HTTPS sim bring-up failed (attempt ${attempt}); retrying"
            docker compose -f docker-compose.https.yml down -v || true
            sleep "$((attempt * 20))"
          done
          exit 1
      - name: Build & start the SSH harness (real Teleport cluster)
        run: |
          for attempt in 1 2 3; do
            if docker compose -f docker-compose.ssh.yml up -d --build --wait; then
              exit 0
            fi
            echo "::warning::SSH harness bring-up failed (attempt ${attempt}); retrying"
            docker compose -f docker-compose.ssh.yml down -v || true
            sleep "$((attempt * 20))"
          done
          exit 1
      # Entra login → group → role over HTTPS: Graph provisioning + ROPC against
      # the TLS azure-sim, with the CA trusted (EDD_SIM_SCHEME=https flips the
      # @edd/config sim base URLs to https).
      - name: Entra auth smoke over HTTPS (mock-free; real CA trust)
        env:
          EDD_SIM_SCHEME: https
          NODE_EXTRA_CA_CERTS: ${{ github.workspace }}/temp/sim-tls/ca.pem
        run: pnpm --filter @edd/web exec vitest run --config vitest.e2e.config.ts lib/entra-auth.e2e.ts
      # SSH connect-as-principal + authz-deny against the real Teleport cluster
      # (already TLS on its proxy/auth ports).
      - name: SSH connect + authz-deny over TLS (mock-free Teleport)
        run: pnpm --filter @edd/ssh-gateway exec vitest run --config vitest.e2e.config.ts src/ssh-connect.e2e.ts
      - if: always()
        run: docker compose -f docker-compose.https.yml down
      - if: always()
        run: docker compose -f docker-compose.ssh.yml down

  playwright:
    name: playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v6.0.8
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Start DynamoDB Local
        run: docker compose -f docker-compose.e2e.yml up -d --wait dynamodb-local
      - name: Install Playwright browser
        run: pnpm --filter web exec playwright install --with-deps chromium
      # test:pw builds + starts the app (its webServer) and creates the table in
      # global-setup, then drives the browser through the RBAC-gated portal flows.
      - run: pnpm --filter web test:pw
      - if: always()
        run: docker compose -f docker-compose.e2e.yml down

  check-deps:
    name: check-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v6.0.8
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_wrapper: false
      - run: pnpm install --frozen-lockfile
      - name: Dependency freshness (Node + Terraform)
        run: bash scripts/check-latest-deps.sh

  terraform:
    name: terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_wrapper: false
      - run: terraform fmt -check -recursive infra/terraform
      - name: Validate the platform module
        run: |
          terraform -chdir=infra/terraform/modules/ecs-dev-desktop init -backend=false -input=false
          terraform -chdir=infra/terraform/modules/ecs-dev-desktop validate
      - name: Validate the complete example
        run: |
          terraform -chdir=infra/terraform/examples/complete init -backend=false -input=false
          terraform -chdir=infra/terraform/examples/complete validate
      # The sim-backed test (tests/sim) runs in its own `terraform-sim` job below.

  terraform-sim:
    name: terraform-sim
    runs-on: ubuntu-latest
    # Defensive cap (sim build + full apply+destroy against the sim).
    timeout-minutes: 25
    env:
      # tests/sim defaults sim_endpoint to this; kept explicit for the apply step.
      SIM_ENDPOINT: http://127.0.0.1:4566
      TF_DIR: infra/terraform/modules/ecs-dev-desktop/tests/sim
      # Dummy creds + region for the AWS CLI (simulate-principal-policy assertions).
      # The sim ignores credential values; region must be set explicitly.
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          submodules: recursive # third_party/sockerless — the sim is built from source
      - uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_wrapper: false
      # Retry bring-up: image pulls can transiently hit registry rate limits
      # (public.ecr.aws / Docker Hub) on shared runner IPs.
      - name: Build & start the sockerless AWS simulator (from source, API-only mode)
        run: |
          for attempt in 1 2 3; do
            if docker compose -f docker-compose.tier2.yml up -d --build --wait sockerless-aws; then
              exit 0
            fi
            echo "::warning::sim bring-up failed (attempt ${attempt}); retrying"
            docker compose -f docker-compose.tier2.yml down -v || true
            sleep "$((attempt * 20))"
          done
          exit 1
      - name: terraform init + validate
        run: |
          terraform -chdir="${TF_DIR}" init -input=false
          terraform -chdir="${TF_DIR}" validate
      # Full non-mocked apply+destroy against the LIVE sim every PR — provisions
      # the entire platform stack (VPC + NAT, KMS, DynamoDB single-table w/ GSIs,
      # ECR, ECS cluster + Fargate service + capacity providers + autoscaling,
      # ALB, IAM, scheduler, logs) and tears it down. Per AGENTS.md §6.8 the only
      # difference from a real-cloud apply is the provider endpoints + dummy creds.
      # Post-apply: resource verification across all services + IAM simulation (4
      # policy-evaluation checks) + idempotency (plan -detailed-exitcode = 0).
      # Four active configurations: default, fck-nat, DNS/TLS (all sims fixed upstream).
      - name: terraform apply + resource verification + IAM simulation + idempotency + destroy (default stack)
        run: |
          terraform -chdir="${TF_DIR}" apply -auto-approve -input=false -var "sim_endpoint=${SIM_ENDPOINT}"

          # -- read outputs -------------------------------------------------------
          ENDPT="${SIM_ENDPOINT}"
          TABLE_NAME=$(terraform -chdir="${TF_DIR}" output -raw dynamodb_table_name)
          TABLE_ARN=$(terraform  -chdir="${TF_DIR}" output -raw dynamodb_table_arn)
          KMS_ARN=$(terraform    -chdir="${TF_DIR}" output -raw kms_key_arn)
          CLUSTER=$(terraform    -chdir="${TF_DIR}" output -raw ecs_cluster_name)
          CLUSTER_ARN=$(terraform -chdir="${TF_DIR}" output -raw ecs_cluster_arn)
          VPC_ID=$(terraform     -chdir="${TF_DIR}" output -raw vpc_id)
          CTRL_ROLE=$(terraform  -chdir="${TF_DIR}" output -raw control_plane_task_role_arn)
          ALB_SG=$(terraform    -chdir="${TF_DIR}" output -raw alb_security_group_id)
          TASKS_SG=$(terraform  -chdir="${TF_DIR}" output -raw tasks_security_group_id)

          # -- helpers ------------------------------------------------------------
          assert_eq() {
            local label="$1" want="$2" got="$3"
            if [ "${got}" = "${want}" ]; then
              printf 'PASS  %s\n' "${label}"
            else
              printf 'FAIL  %s: expected [%s] got [%s]\n' "${label}" "${want}" "${got}"
              exit 1
            fi
          }

          assert_iam() {
            local label="$1" want="$2"
            shift 2
            got=$(aws --endpoint-url "${ENDPT}" iam simulate-principal-policy \
              --policy-source-arn "${CTRL_ROLE}" "$@" \
              --query 'EvaluationResults[0].EvalDecision' --output text)
            if [ "${got}" = "${want}" ]; then
              printf 'PASS  %s\n' "${label}"
            else
              printf 'FAIL  %s: expected %s, got %s\n' "${label}" "${want}" "${got}"
              exit 1
            fi
          }

          # -- DynamoDB -----------------------------------------------------------
          assert_eq "DynamoDB table ACTIVE" "ACTIVE" \
            "$(aws --endpoint-url "${ENDPT}" dynamodb describe-table \
              --table-name "${TABLE_NAME}" \
              --query 'Table.TableStatus' --output text)"
          assert_eq "DynamoDB billing PAY_PER_REQUEST" "PAY_PER_REQUEST" \
            "$(aws --endpoint-url "${ENDPT}" dynamodb describe-table \
              --table-name "${TABLE_NAME}" \
              --query 'Table.BillingModeSummary.BillingMode' --output text)"
          assert_eq "DynamoDB GSI count 2" "2" \
            "$(aws --endpoint-url "${ENDPT}" dynamodb describe-table \
              --table-name "${TABLE_NAME}" \
              --query 'length(Table.GlobalSecondaryIndexes)' --output text)"

          # -- KMS ----------------------------------------------------------------
          # Extract key ID from the ARN (last path segment).
          KMS_KEY_ID="${KMS_ARN##*/}"
          assert_eq "KMS key Enabled" "Enabled" \
            "$(aws --endpoint-url "${ENDPT}" kms describe-key --key-id "${KMS_KEY_ID}" \
              --query 'KeyMetadata.KeyState' --output text)"
          assert_eq "KMS rotation enabled" "True" \
            "$(aws --endpoint-url "${ENDPT}" kms get-key-rotation-status \
              --key-id "${KMS_KEY_ID}" \
              --query 'KeyRotationEnabled' --output text)"

          # -- ECR ----------------------------------------------------------------
          assert_eq "ECR control-plane repo exists" "eddsim/control-plane" \
            "$(aws --endpoint-url "${ENDPT}" ecr describe-repositories \
              --repository-names "eddsim/control-plane" \
              --query 'repositories[0].repositoryName' --output text)"
          assert_eq "ECR golden/node-20 repo exists" "eddsim/golden/node-20" \
            "$(aws --endpoint-url "${ENDPT}" ecr describe-repositories \
              --repository-names "eddsim/golden/node-20" \
              --query 'repositories[0].repositoryName' --output text)"
          aws --endpoint-url "${ENDPT}" ecr get-lifecycle-policy \
            --repository-name "eddsim/control-plane" \
            --query 'lifecyclePolicyText' --output text > /dev/null
          printf 'PASS  ECR control-plane lifecycle policy\n'
          aws --endpoint-url "${ENDPT}" ecr get-lifecycle-policy \
            --repository-name "eddsim/golden/node-20" \
            --query 'lifecyclePolicyText' --output text > /dev/null
          printf 'PASS  ECR golden/node-20 lifecycle policy\n'
          assert_eq "ECR control-plane scan-on-push enabled" "True" \
            "$(aws --endpoint-url "${ENDPT}" ecr describe-repositories \
              --repository-names "eddsim/control-plane" \
              --query 'repositories[0].imageScanningConfiguration.scanOnPush' --output text)"
          assert_eq "ECR control-plane encryption type KMS" "KMS" \
            "$(aws --endpoint-url "${ENDPT}" ecr describe-repositories \
              --repository-names "eddsim/control-plane" \
              --query 'repositories[0].encryptionConfiguration.encryptionType' --output text)"

          # -- ECS ----------------------------------------------------------------
          assert_eq "ECS cluster ACTIVE" "ACTIVE" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-clusters \
              --clusters "${CLUSTER}" \
              --query 'clusters[0].status' --output text)"
          assert_eq "ECS cluster capacity provider count 2" "2" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-clusters \
              --clusters "${CLUSTER}" \
              --query 'length(clusters[0].capacityProviders)' --output text)"
          assert_eq "ECS default capacity provider FARGATE" "FARGATE" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-clusters \
              --clusters "${CLUSTER}" \
              --query 'clusters[0].defaultCapacityProviderStrategy[0].capacityProvider' --output text)"
          assert_eq "ECS task-definition family count 2" "2" \
            "$(aws --endpoint-url "${ENDPT}" ecs list-task-definition-families \
              --family-prefix "eddsim" \
              --query 'length(families)' --output text)"
          assert_eq "ECS control-plane service ACTIVE" "ACTIVE" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-services \
              --cluster "${CLUSTER}" --services "eddsim-control-plane" \
              --query 'services[0].status' --output text)"
          assert_eq "ECS service launch type FARGATE" "FARGATE" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-services \
              --cluster "${CLUSTER}" --services "eddsim-control-plane" \
              --query 'services[0].launchType' --output text)"
          assert_eq "ECS cluster containerInsights enabled" "enabled" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-clusters \
              --clusters "${CLUSTER}" --include SETTINGS \
              --query "clusters[0].settings[?name=='containerInsights'].value|[0]" --output text)"
          assert_eq "ECS cluster executeCommand KMS key set" "${KMS_ARN}" \
            "$(aws --endpoint-url "${ENDPT}" ecs describe-clusters \
              --clusters "${CLUSTER}" --include CONFIGURATIONS \
              --query 'clusters[0].configuration.executeCommandConfiguration.kmsKeyId' --output text)"

          # -- AppAutoScaling -----------------------------------------------------
          assert_eq "AppAutoScaling target registered" "1" \
            "$(aws --endpoint-url "${ENDPT}" application-autoscaling describe-scalable-targets \
              --service-namespace ecs \
              --query 'length(ScalableTargets)' --output text)"
          assert_eq "AppAutoScaling policy TargetTrackingScaling" "TargetTrackingScaling" \
            "$(aws --endpoint-url "${ENDPT}" application-autoscaling describe-scaling-policies \
              --service-namespace ecs \
              --query 'ScalingPolicies[0].PolicyType' --output text)"

          # -- EventBridge Scheduler ----------------------------------------------
          assert_eq "Scheduler reconciler ENABLED" "ENABLED" \
            "$(aws --endpoint-url "${ENDPT}" scheduler get-schedule \
              --name "eddsim-reconciler" \
              --query 'State' --output text)"
          assert_eq "Scheduler target is ECS cluster" "${CLUSTER_ARN}" \
            "$(aws --endpoint-url "${ENDPT}" scheduler get-schedule \
              --name "eddsim-reconciler" \
              --query 'Target.Arn' --output text)"
          assert_eq "Scheduler ECS launch type FARGATE" "FARGATE" \
            "$(aws --endpoint-url "${ENDPT}" scheduler get-schedule \
              --name "eddsim-reconciler" \
              --query 'Target.EcsParameters.LaunchType' --output text)"

          # -- CloudWatch Logs ----------------------------------------------------
          assert_eq "CW log group count 3" "3" \
            "$(aws --endpoint-url "${ENDPT}" logs describe-log-groups \
              --log-group-name-prefix "/eddsim" \
              --query 'length(logGroups)' --output text)"
          assert_eq "CW control-plane log group retention 30d" "30" \
            "$(aws --endpoint-url "${ENDPT}" logs describe-log-groups \
              --log-group-name-prefix "/eddsim/control-plane" \
              --query 'logGroups[0].retentionInDays' --output text)"
          assert_eq "CW control-plane log group kmsKeyId set" "${KMS_ARN}" \
            "$(aws --endpoint-url "${ENDPT}" logs describe-log-groups \
              --log-group-name-prefix "/eddsim/control-plane" \
              --query 'logGroups[0].kmsKeyId' --output text)"

          # -- ALB + listeners + target group -------------------------------------
          LB_ARN=$(aws --endpoint-url "${ENDPT}" elbv2 describe-load-balancers \
            --query "LoadBalancers[?starts_with(LoadBalancerName,'eddsim')].LoadBalancerArn|[0]" \
            --output text)
          assert_eq "ALB state active" "active" \
            "$(aws --endpoint-url "${ENDPT}" elbv2 describe-load-balancers \
              --query "LoadBalancers[?starts_with(LoadBalancerName,'eddsim')].State.Code|[0]" \
              --output text)"
          assert_eq "ALB scheme internet-facing" "internet-facing" \
            "$(aws --endpoint-url "${ENDPT}" elbv2 describe-load-balancers \
              --query "LoadBalancers[?starts_with(LoadBalancerName,'eddsim')].Scheme|[0]" \
              --output text)"
          assert_eq "ALB HTTP listener port 80" "80" \
            "$(aws --endpoint-url "${ENDPT}" elbv2 describe-listeners \
              --load-balancer-arn "${LB_ARN}" \
              --query "Listeners[?Port==\`80\`].Port|[0]" --output text)"
          assert_eq "ALB target group type ip" "ip" \
            "$(aws --endpoint-url "${ENDPT}" elbv2 describe-target-groups \
              --query "TargetGroups[?starts_with(TargetGroupName,'eddsim')].TargetType|[0]" \
              --output text)"
          assert_eq "ALB target group port 3000" "3000" \
            "$(aws --endpoint-url "${ENDPT}" elbv2 describe-target-groups \
              --query "TargetGroups[?starts_with(TargetGroupName,'eddsim')].Port|[0]" \
              --output text)"

          # -- IAM roles + policies -----------------------------------------------
          for ROLE in eddsim-task-execution eddsim-control-plane eddsim-reconciler \
                       eddsim-scheduler eddsim-ecs-infrastructure; do
            assert_eq "IAM role ${ROLE} exists" "${ROLE}" \
              "$(aws --endpoint-url "${ENDPT}" iam get-role --role-name "${ROLE}" \
                --query 'Role.RoleName' --output text)"
          done
          assert_eq "IAM execution AmazonECSTaskExecutionRolePolicy attached" "1" \
            "$(aws --endpoint-url "${ENDPT}" iam list-attached-role-policies \
              --role-name eddsim-task-execution \
              --query "length(AttachedPolicies[?PolicyName==\`AmazonECSTaskExecutionRolePolicy\`])" \
              --output text)"
          assert_eq "IAM control-plane inline policy count 1" "1" \
            "$(aws --endpoint-url "${ENDPT}" iam list-role-policies \
              --role-name eddsim-control-plane --query 'length(PolicyNames)' --output text)"
          assert_eq "IAM reconciler inline policy count 1" "1" \
            "$(aws --endpoint-url "${ENDPT}" iam list-role-policies \
              --role-name eddsim-reconciler --query 'length(PolicyNames)' --output text)"
          assert_eq "IAM platform roles count 5" "5" \
            "$(aws --endpoint-url "${ENDPT}" iam list-roles \
              --query "length(Roles[?starts_with(RoleName,'eddsim')])" --output text)"

          # -- Networking: subnets, NAT, security groups --------------------------
          # vpc-id filter from Terraform output — works for subnets, NAT, route tables.
          assert_eq "Subnet count 4 (2 public + 2 private)" "4" \
            "$(aws --endpoint-url "${ENDPT}" ec2 describe-subnets \
              --filters "Name=vpc-id,Values=${VPC_ID}" \
              --query 'length(Subnets)' --output text)"
          assert_eq "NAT gateway available" "1" \
            "$(aws --endpoint-url "${ENDPT}" ec2 describe-nat-gateways \
              --filter "Name=vpc-id,Values=${VPC_ID}" \
              --query "length(NatGateways[?State==\`available\`])" --output text)"
          assert_eq "Internet gateway attached" "1" \
            "$(aws --endpoint-url "${ENDPT}" ec2 describe-internet-gateways \
              --filters "Name=attachment.vpc-id,Values=${VPC_ID}" \
              --query 'length(InternetGateways)' --output text)"
          # Route tables: 1 public + 2 private = 3 total.
          assert_eq "Route table count 3" "3" \
            "$(aws --endpoint-url "${ENDPT}" ec2 describe-route-tables \
              --filters "Name=vpc-id,Values=${VPC_ID}" \
              --query 'length(RouteTables)' --output text)"
          # SGs: use IDs from Terraform outputs (most precise; identical on real AWS).
          assert_eq "ALB SG exists" "${ALB_SG}" \
            "$(aws --endpoint-url "${ENDPT}" ec2 describe-security-groups \
              --group-ids "${ALB_SG}" \
              --query 'SecurityGroups[0].GroupId' --output text)"
          assert_eq "Tasks SG exists" "${TASKS_SG}" \
            "$(aws --endpoint-url "${ENDPT}" ec2 describe-security-groups \
              --group-ids "${TASKS_SG}" \
              --query 'SecurityGroups[0].GroupId' --output text)"
          assert_eq "ALB SG has port-80 ingress rule" "1" \
            "$(aws --endpoint-url "${ENDPT}" ec2 describe-security-group-rules \
              --filters "Name=group-id,Values=${ALB_SG}" \
              --query "length(SecurityGroupRules[?IsEgress==\`false\` && FromPort==\`80\`])" \
              --output text)"
          assert_eq "Tasks SG has ALB-sourced ingress rule" "1" \
            "$(aws --endpoint-url "${ENDPT}" ec2 describe-security-group-rules \
              --filters "Name=group-id,Values=${TASKS_SG}" \
              --query "length(SecurityGroupRules[?IsEgress==\`false\` && ReferencedGroupInfo.GroupId!=\`null\`])" \
              --output text)"

          # -- IAM policy simulation (existing 4 checks) -------------------------
          # Stated allow — DynamoDB PutItem on the owned table.
          assert_iam "dynamodb:PutItem allowed" "allowed" \
            --action-names "dynamodb:PutItem" --resource-arns "${TABLE_ARN}"
          # Implicit deny — action not in any policy statement.
          assert_iam "s3:GetObject implicitDeny" "implicitDeny" \
            --action-names "s3:GetObject" --resource-arns "arn:aws:s3:::bucket/key"
          # Tag condition not satisfied → implicit deny (ReapManagedEbsOnly only grants
          # ec2:DeleteVolume when aws:ResourceTag/edd:managed = "true").
          assert_iam "ec2:DeleteVolume untagged implicitDeny" "implicitDeny" \
            --action-names "ec2:DeleteVolume" \
            --resource-arns "arn:aws:ec2:us-east-1::volume/vol-untagged"
          # Tag condition satisfied → allowed.
          assert_iam "ec2:DeleteVolume tagged allowed" "allowed" \
            --action-names "ec2:DeleteVolume" \
            --resource-arns "arn:aws:ec2:us-east-1::volume/vol-managed" \
            --context-entries "ContextKeyName=aws:ResourceTag/edd:managed,ContextKeyValues=true,ContextKeyType=string"

          # -- Idempotency: plan after apply must show 0 changes ------------------
          terraform -chdir="${TF_DIR}" plan -input=false \
            -var "sim_endpoint=${SIM_ENDPOINT}" -detailed-exitcode
          printf 'PASS  idempotency (plan exit 0)\n'

          terraform -chdir="${TF_DIR}" destroy -auto-approve -input=false -var "sim_endpoint=${SIM_ENDPOINT}"

      # fck-nat NAT-instance path: Launch Template (#439/#433), ENI (#430),
      # IAM ListPolicyVersions (#449/#441) — all fixed upstream.
      - name: terraform apply + resource verification + idempotency + destroy (fck-nat NAT instance)
        run: |
          terraform -chdir="${TF_DIR}" apply -auto-approve -input=false \
            -var "sim_endpoint=${SIM_ENDPOINT}" -var nat_mode=instance

          ENDPT="${SIM_ENDPOINT}"
          VPC_ID=$(terraform  -chdir="${TF_DIR}" output -raw vpc_id)
          ENI_ID=$(terraform  -chdir="${TF_DIR}" output -raw nat_instance_eni_id)

          assert_eq() {
            local label="$1" want="$2" got="$3"
            if [ "${got}" = "${want}" ]; then printf 'PASS  %s\n' "${label}"
            else printf 'FAIL  %s: expected [%s] got [%s]\n' "${label}" "${want}" "${got}"; exit 1; fi
          }

          assert_eq "fck-nat launch template exists" "eddsim-nat" \
            "$(aws --endpoint-url "${ENDPT}" ec2 describe-launch-templates \
              --filters "Name=launch-template-name,Values=eddsim-nat" \
              --query 'LaunchTemplates[0].LaunchTemplateName' --output text)"
          assert_eq "fck-nat ENI exists" "${ENI_ID}" \
            "$(aws --endpoint-url "${ENDPT}" ec2 describe-network-interfaces \
              --network-interface-ids "${ENI_ID}" \
              --query 'NetworkInterfaces[0].NetworkInterfaceId' --output text)"
          assert_eq "fck-nat IAM role exists" "eddsim-nat" \
            "$(aws --endpoint-url "${ENDPT}" iam get-role --role-name eddsim-nat \
              --query 'Role.RoleName' --output text)"
          assert_eq "No managed NAT gateways in instance mode" "0" \
            "$(aws --endpoint-url "${ENDPT}" ec2 describe-nat-gateways \
              --filter "Name=vpc-id,Values=${VPC_ID}" \
              --query "length(NatGateways[?State==\`available\`])" --output text)"

          terraform -chdir="${TF_DIR}" plan -input=false \
            -var "sim_endpoint=${SIM_ENDPOINT}" -var nat_mode=instance -detailed-exitcode
          printf 'PASS  idempotency fck-nat (plan exit 0)\n'

          terraform -chdir="${TF_DIR}" destroy -auto-approve -input=false \
            -var "sim_endpoint=${SIM_ENDPOINT}" -var nat_mode=instance

      # DNS/TLS path: re-apply with enable_dns=true so the module's ACM cert +
      # Route53 validation + HTTPS listener (dns.tf) provision against the sim
      # (64 resources). The two ACM gaps — #421 (wildcard-SAN validation record
      # name) and #420 (cert never reaching ISSUED) — were fixed upstream by #424.
      - name: terraform apply + resource verification + idempotency + destroy (DNS/TLS)
        run: |
          terraform -chdir="${TF_DIR}" apply -auto-approve -input=false \
            -var "sim_endpoint=${SIM_ENDPOINT}" -var enable_dns=true

          # -- read outputs -------------------------------------------------------
          ENDPT="${SIM_ENDPOINT}"

          assert_eq() {
            local label="$1" want="$2" got="$3"
            if [ "${got}" = "${want}" ]; then
              printf 'PASS  %s\n' "${label}"
            else
              printf 'FAIL  %s: expected [%s] got [%s]\n' "${label}" "${want}" "${got}"
              exit 1
            fi
          }

          # -- DNS/TLS-specific assertions ----------------------------------------
          LB_ARN=$(aws --endpoint-url "${ENDPT}" elbv2 describe-load-balancers \
            --query "LoadBalancers[?starts_with(LoadBalancerName,'eddsim')].LoadBalancerArn|[0]" \
            --output text)
          assert_eq "ALB HTTPS listener port 443" "443" \
            "$(aws --endpoint-url "${ENDPT}" elbv2 describe-listeners \
              --load-balancer-arn "${LB_ARN}" \
              --query "Listeners[?Port==\`443\`].Port|[0]" --output text)"
          # ACM cert must reach ISSUED before aws_acm_certificate_validation completes.
          CERT_ARN=$(aws --endpoint-url "${ENDPT}" elbv2 describe-listeners \
            --load-balancer-arn "${LB_ARN}" \
            --query "Listeners[?Port==\`443\`].Certificates[0].CertificateArn|[0]" \
            --output text)
          assert_eq "ACM cert ISSUED" "ISSUED" \
            "$(aws --endpoint-url "${ENDPT}" acm describe-certificate \
              --certificate-arn "${CERT_ARN}" \
              --query 'Certificate.Status' --output text)"
          # HTTP listener must redirect to HTTPS in DNS mode.
          assert_eq "ALB HTTP listener redirects to HTTPS" "redirect" \
            "$(aws --endpoint-url "${ENDPT}" elbv2 describe-listeners \
              --load-balancer-arn "${LB_ARN}" \
              --query "Listeners[?Port==\`80\`].DefaultActions[0].Type|[0]" --output text)"

          # -- Idempotency --------------------------------------------------------
          terraform -chdir="${TF_DIR}" plan -input=false \
            -var "sim_endpoint=${SIM_ENDPOINT}" -var enable_dns=true -detailed-exitcode
          printf 'PASS  idempotency DNS/TLS (plan exit 0)\n'

          terraform -chdir="${TF_DIR}" destroy -auto-approve -input=false \
            -var "sim_endpoint=${SIM_ENDPOINT}" -var enable_dns=true
      - if: always()
        run: docker compose -f docker-compose.tier2.yml down

  shellcheck:
    name: shellcheck
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install shellcheck + zsh
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install shellcheck
          else
            sudo apt-get update && sudo apt-get install -y shellcheck zsh
          fi
      - name: shellcheck + bash/zsh parse on every shell script
        shell: bash
        run: |
          set -euo pipefail
          files=$(git ls-files '*.sh')
          if [ -z "$files" ]; then echo "no shell scripts"; exit 0; fi
          for f in $files; do
            echo "== $f =="
            shellcheck "$f"
            bash -n "$f"
            zsh -n "$f"
          done

  sast:
    name: sast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: pip install semgrep
      - name: Semgrep SAST (fail on high/critical = ERROR severity)
        run: semgrep scan --config p/default --severity ERROR --error --metrics off packages apps services

  vuln-scan:
    name: vuln-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Trivy (deps + IaC + secrets; fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          # Scan only our IaC, not the internals of third-party Terraform modules
          # (e.g. RaJiska/fck-nat) that Trivy would otherwise resolve and scan.
          TRIVY_TF_EXCLUDE_DOWNLOADED_MODULES: "true"
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          exit-code: "1"
          skip-dirs: node_modules
