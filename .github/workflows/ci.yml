            --query 'logGroups[0].arn' --output text)
          assert_iam "logs:PutLogEvents on owned log group allowed" "allowed" \
            --action-names "logs:PutLogEvents" --resource-arns "${CP_LOG_ARN}:*"
          # logs:PutLogEvents denied on an unrelated log group.
          assert_iam "logs:PutLogEvents on foreign log group denied" "implicitDeny" \
            --action-names "logs:PutLogEvents" \
            --resource-arns "arn:aws:logs:us-east-1:123456789012:log-group:/other:*"
          # cloudtrail:LookupEvents — stars resource, should always be allowed.
          assert_iam "cloudtrail:LookupEvents allowed" "allowed" \
            --action-names "cloudtrail:LookupEvents" --resource-arns "*"
          # iam:PassRole to ECS tasks service allowed for execution + infra roles.
          assert_iam "iam:PassRole execution role to ecs-tasks allowed" "allowed" \
            --action-names "iam:PassRole" --resource-arns "${EXEC_ROLE_ARN}" \
            --context-entries "ContextKeyName=iam:PassedToService,ContextKeyValues=ecs-tasks.amazonaws.com,ContextKeyType=string"
          # IAM self-check grant: the control plane must be able to simulate its own
          # principal (the runtime config-sync IAM preflight depends on this).
          assert_iam "iam:SimulatePrincipalPolicy self-check allowed" "allowed" \
            --action-names "iam:SimulatePrincipalPolicy" --resource-arns "*"

          # -- IAM policy simulation: reconciler role --------------------------------
          RECON_ROLE=$(terraform -chdir="${TF_DIR}" output -raw reconciler_task_role_arn)
          assert_eq "reconciler ecs:StopTask on cluster allowed" "allowed" \
