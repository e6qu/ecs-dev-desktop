# SPDX-License-Identifier: AGPL-3.0-or-later
# Verify + publish the GitHub Pages site: the landing (/), the interactive demo (/demo), and the
# docs stub (/docs). The demo is a static client-only build of apps/demo (the real @edd/core in
# the browser). Pages must be enabled once: Settings -> Pages -> Source: GitHub Actions.
#
# The `verify` job (lint + unit + a real-browser smoke) runs on PRs AND before every deploy, so a
# demo that crashes at runtime (e.g. the blank-screen-on-stale-state regression) is caught before
# it reaches the live site — `deploy` only runs once `verify` is green.
name: pages

on:
  push:
    branches: [main]
    paths:
      - "apps/demo/**"
      - "site/**"
      - "packages/core/**"
      - ".github/workflows/pages.yml"
  pull_request:
    paths:
      - "apps/demo/**"
      - "site/**"
      - "packages/core/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: verify (lint, unit, browser smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm --filter @edd/demo lint
      - name: Unit tests
        run: pnpm --filter @edd/demo test
      - name: Install Playwright browser
        run: pnpm --filter @edd/demo exec playwright install chromium
      - name: Browser smoke (build + preview + drive a real browser)
        run: pnpm --filter @edd/demo test:smoke

  deploy:
    name: build + deploy
    needs: verify
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: write # to delete a stale same-run artifact before re-uploading (see below)
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    # Allow one Pages deploy at a time; don't cancel an in-progress publish.
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - run: pnpm install --frozen-lockfile
      # Project Pages serve under /<repo>/, so the demo lives at /ecs-dev-desktop/demo/.
      - name: Build the demo (project-Pages base path)
        run: DEMO_BASE=/ecs-dev-desktop/demo/ pnpm --filter @edd/demo build
      - name: Assemble the site (/ landing, /demo, /docs)
        run: |
          rm -rf _site
          cp -r site _site
          mkdir -p _site/demo
          cp -r apps/demo/dist/. _site/demo/
      - uses: actions/configure-pages@v5
      # actions/upload-pages-artifact never overwrites (no `overwrite` input), and a
      # prior attempt's "github-pages" artifact for THIS run id is never cleaned up by
      # GitHub. So re-running the "build + deploy" job (e.g. after a transient
      # deploy-pages hiccup) uploads a second same-named artifact, and deploy-pages then
      # refuses to pick one ("Multiple artifacts named 'github-pages' were unexpectedly
      # found ... Artifact count is 2") — every retry after the first failure fails this
      # way. Delete any leftover one from an earlier attempt of this exact run first.
      - name: Remove a stale github-pages artifact from an earlier attempt of this run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[] | select(.name == "github-pages") | .id' |
            while read -r id; do
              echo "deleting stale artifact $id"
              gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id"
            done
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
