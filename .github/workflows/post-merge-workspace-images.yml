# SPDX-License-Identifier: AGPL-3.0-or-later
# After a PR merges to main, start the existing deployment CodeBuild project in
# golden-only mode. This is intentionally asynchronous: GitHub Actions records that
# the build was started, while /admin/images shows the running build, status, and
# live logs from CodeBuild.
name: post-merge-workspace-images

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (defaults to the short git SHA)"
        required: false
        default: ""
      ref:
        description: "Git branch/tag CodeBuild should clone (defaults to main)"
        required: false
        default: "main"
      source_version:
        description: "Exact commit SHA to checkout after clone (defaults to this workflow SHA)"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

concurrency:
  group: post-merge-workspace-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  start-golden-build:
    name: start golden image build
    if: vars.PROD_IMAGE_BUILD_AWS_ROLE_ARN != ''
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.PROD_IMAGE_BUILD_AWS_REGION || 'eu-west-1' }}
      CODEBUILD_PROJECT: ${{ vars.PROD_IMAGE_BUILD_PROJECT || 'edd-prod-build-images' }}
      INPUT_TAG: ${{ github.event.inputs.tag || '' }}
      INPUT_REF: ${{ github.event.inputs.ref || 'main' }}
      INPUT_SOURCE_VERSION: ${{ github.event.inputs.source_version || '' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          role-to-assume: ${{ vars.PROD_IMAGE_BUILD_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: workspace-images-${{ github.run_id }}

      - name: Start golden image CodeBuild run
        env:
          EVENT_SHA: ${{ github.sha }}
        run: |
          set -eu
          tag="${INPUT_TAG:-${EVENT_SHA}}"
          tag="$(printf '%s' "$tag" | cut -c1-12)"
          source_ref="${INPUT_REF:-main}"
          source_version="${INPUT_SOURCE_VERSION:-${EVENT_SHA}}"
          build_id="$(
            aws codebuild start-build \
              --region "$AWS_REGION" \
              --project-name "$CODEBUILD_PROJECT" \
              --environment-variables-override \
                "name=EDD_BUILD_TARGET,value=golden,type=PLAINTEXT" \
                "name=TAG,value=${tag},type=PLAINTEXT" \
                "name=SOURCE_REF,value=${source_ref},type=PLAINTEXT" \
                "name=SOURCE_VERSION,value=${source_version},type=PLAINTEXT" \
                "name=EDD_TRIGGER,value=github-main-merge,type=PLAINTEXT" \
              --query 'build.id' \
              --output text
          )"
          printf 'Started %s for golden workspace image tag %s from %s@%s\n' \
            "$build_id" "$tag" "$source_ref" "$source_version"
