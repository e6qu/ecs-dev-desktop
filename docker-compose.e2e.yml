# Tier-2.5 e2e harness: the sockerless AWS sim in CONTAINER mode (it executes real
# task containers, unlike the process-mode Tier-2 sim) so we can prove the full
# workspace data-fidelity loop. Needs a container runtime: the Docker/podman
# socket mounted + --privileged. Consumed endpoint-only (AGENTS.md §6.8).
#
# Built from the pinned third_party/sockerless submodule (same image as Tier-2).

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    command: ["-jar", "DynamoDBLocal.jar", "-inMemory", "-sharedDb"]
    ports:
      - "8000:8000"

  sockerless-aws-exec:
    build:
      context: ./third_party/sockerless/simulators
      dockerfile: aws/Dockerfile
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4566/"]
      interval: 3s
      timeout: 3s
      retries: 30

  # bleephub: the sockerless GitHub server (mock-free auth e2e).
  bleephub:
    build:
      context: .
      dockerfile: infra/sim/bleephub.Dockerfile
    ports:
      - "5555:5555"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5555/api/v3/rate_limit"]
      interval: 3s
      timeout: 3s
      retries: 20

  # azure-sim: the sockerless Azure/Entra simulator (mock-free Entra auth e2e).
  # Drives the standard surfaces only — Microsoft Graph user/group provisioning,
  # group membership, and the ROPC token grant — so the test is swappable with
  # real Entra by base-URL alone (AGENTS.md §6.8).
  azure-sim:
    build:
      context: ./third_party/sockerless/simulators
      dockerfile: azure/Dockerfile
    # API-only: the auth flow (Graph + OAuth) executes no workloads, so the sim
    # needs no container runtime — process mode (same as the Tier-2 harness).
    environment:
      SIM_RUNTIME: process
    ports:
      - "4568:4568"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://localhost:4568/common/v2.0/.well-known/openid-configuration",
        ]
      interval: 3s
      timeout: 3s
      retries: 30
